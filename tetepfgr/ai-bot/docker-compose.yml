version: '3.8'

services:
  # Ollama - локальная LLM
  ollama:
    image: ollama/ollama:latest
    container_name: pgr-ollama
    ports:
      - "11434:11434"
    volumes:
      - ../ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - pgr-rag-network

  # Redis - кэш ответов
  redis:
    image: redis:7-alpine
    container_name: pgr-redis
    ports:
      - "6379:6379"
    volumes:
      - ../redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - pgr-rag-network

  # AI-бот - главный мозг
  ai-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pgr-ai-bot
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_URL=http://ollama:11434
      - API_KEY=${API_KEY}
    volumes:
      - ..:/data/repo:ro
      - ../../documentation:/data/documentation:ro
      - ./logs:/app/logs
      - ./chroma_data:/app/chroma_data
      - ./snapshots:/app/snapshots
      - pip_cache:/root/.cache/pip
      - chroma_cache:/root/.cache/chroma
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - pgr-rag-network

  # Docs-server (интерфейс документации)
  docs-server:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: pgr-docs-server
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
    environment:
      - AI_BOT_URL=http://ai-bot:8000
    depends_on:
      - ai-bot
    restart: unless-stopped
    networks:
      - pgr-rag-network

  # Ngrok - туннель для показа через интернет
  ngrok:
    image: ngrok/ngrok:

volumes:
  ollama_data:
  redis_data:
  pip_cache:
  chroma_cache:
  hf_cache:
