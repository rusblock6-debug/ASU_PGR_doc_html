<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документация АСУ ПГР</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        pgr: {
                            orange: '#ed8d48',
                            dark: '#0b0e14',
                            sidebar: '#0f1219',
                            card: '#141820',
                            border: '#1e2530',
                            text: '#8b95a5',
                            muted: '#5c6577'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0e14; }
        ::-webkit-scrollbar-thumb { background: #1e2530; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ed8d48; }
        .glass-card {
            background: rgba(20, 24, 32, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(237, 141, 72, 0.3);
            box-shadow: 0 4px 20px rgba(237, 141, 72, 0.05);
            transform: translateY(-2px);
        }
        .role-btn {
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .role-btn.active {
            background: rgba(237, 141, 72, 0.1);
            color: #ed8d48;
            border-color: rgba(237, 141, 72, 0.2);
            font-weight: 600;
            box-shadow: none;
        }
        .chat-bubble-ai {
            background: #141820;
            border: 1px solid #1e2530;
            border-left: 3px solid #ed8d48;
        }
        .chat-bubble-user {
            background: rgba(237, 141, 72, 0.15);
            border: 1px solid rgba(237, 141, 72, 0.3);
        }
        .img-modal {
            display: none; position: fixed; inset: 0; z-index: 99999;
            background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out;
        }
        .img-modal.active { display: flex; }
        .img-modal img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
        .search-hl { background: rgba(237, 141, 72, 0.35); border-radius: 2px; box-shadow: 0 0 0 1px rgba(237,141,72,0.2); }
        .search-hl-current { background: rgba(237, 141, 72, 0.75); color: #0b0e14; font-weight: 600; border-radius: 2px; }
        #content-view { scroll-behavior: smooth; }
        .search-dropdown { position: absolute; right: 0; top: calc(100% + 8px); width: 420px; max-height: 70vh; overflow-y: auto; background: #141820; border: 1px solid #1e2530; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 200; display: none; }
        .search-dropdown.active { display: block; }
        .search-dropdown-group { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .search-dropdown-group:last-child { border-bottom: none; }
        .search-dropdown-group-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #5c6577; padding: 4px 16px; }
        .search-dropdown-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 16px; cursor: pointer; transition: all 0.15s; border-left: 3px solid transparent; }
        .search-dropdown-item:hover { background: rgba(237,141,72,0.06); border-left-color: #ed8d48; }
        .search-dropdown-item-icon { width: 28px; height: 28px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #ed8d48; flex-shrink: 0; }
        .search-dropdown-item-text { min-width: 0; }
        .search-dropdown-item-title { font-size: 13px; font-weight: 500; color: #e8ecf1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .search-dropdown-item-meta { font-size: 11px; color: #5c6577; margin-top: 2px; }
        .search-dropdown-empty { padding: 24px 16px; text-align: center; color: #5c6577; font-size: 13px; }
        .search-dropdown-query { color: #ed8d48; font-weight: 500; }
        .nav-active { background: linear-gradient(90deg, rgba(237,141,72,0.12) 0%, rgba(237,141,72,0.02) 100%) !important; color: #ed8d48 !important; border-left: 3px solid #ed8d48 !important; padding-left: 9px !important; }
        .nav-active .nav-chevron { color: #ed8d48 !important; }
        .resize-handle { width: 4px; cursor: col-resize; background: transparent; transition: background 0.2s; position: relative; z-index: 20; }
        .resize-handle:hover, .resize-handle.resizing { background: rgba(237, 141, 72, 0.3); }
        .sidebar-wrapper { display: flex; flex-shrink: 0; transition: width 0.2s ease; }
        .sidebar-wrapper.collapsed { width: 0 !important; overflow: hidden; }
        .sidebar-wrapper.collapsed aside { opacity: 0; pointer-events: none; }
        .sidebar-toggle { transition: all 0.2s; color: #5c6577; }
        .sidebar-toggle:hover { color: #ed8d48; }
        .sidebar-section { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #5c6577; padding: 0 12px; margin: 20px 0 8px; display: flex; align-items: center; gap: 8px; }
        .sidebar-section::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, #1e2530 0%, transparent 100%); }
        .sidebar-link { display: block; padding: 7px 12px; margin: 1px 8px; border-radius: 6px; font-size: 13px; color: #8b95a5; transition: all 0.15s ease; border-left: 3px solid transparent; line-height: 1.4; cursor: pointer; text-decoration: none; }
        .sidebar-link:hover { color: #e8ecf1; background: rgba(255,255,255,0.04); }
        .sidebar-link-child { display: block; padding: 5px 12px 5px 24px; margin: 1px 8px 1px 20px; border-radius: 6px; font-size: 12px; color: #5c6577; transition: all 0.15s ease; border-left: 2px solid #1e2530; position: relative; line-height: 1.4; cursor: pointer; text-decoration: none; }
        .sidebar-link-child::before { content: ''; position: absolute; left: -1px; top: 0; bottom: 0; width: 8px; border-left: 1px solid #1e2530; border-bottom: 1px solid #1e2530; border-bottom-left-radius: 4px; }
        .sidebar-link-child:hover { color: #8b95a5; background: rgba(255,255,255,0.03); border-left-color: rgba(237,141,72,0.3); }
        .nav-active.sidebar-link-child { border-left-color: #ed8d48 !important; padding-left: 24px !important; background: linear-gradient(90deg, rgba(237,141,72,0.08) 0%, transparent 100%) !important; }
        .sidebar-group { margin-bottom: 4px; }
        .dir-table-wrap { overflow: visible; }
        .dir-table thead th { position: sticky; top: 0; background: #141820; z-index: 10; box-shadow: 0 2px 0 #1e2530; }
        .dir-table tbody tr:nth-child(odd) { background: rgba(255,255,255,0.015); }
        .dir-table tbody tr:hover { background: rgba(237,141,72,0.04); }
        .dir-table tr:last-child td { border-bottom: none; }
        .dir-table td { border-bottom: 1px solid rgba(255,255,255,0.06); }
        .param-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; background: rgba(237,141,72,0.1); color: #ed8d48; font-size: 11px; font-weight: 500; margin-left: 8px; vertical-align: middle; }
        .dir-search { background: #0b0e14; border: 1px solid #1e2530; border-radius: 8px; padding: 10px 14px; color: #8b95a5; font-size: 14px; width: 320px; transition: all 0.2s; }
        .dir-search:focus { outline: none; border-color: #ed8d48; box-shadow: 0 0 0 3px rgba(237,141,72,0.1); }
        .empty-state { text-align: center; padding: 60px 20px; color: #5c6577; }
        .glass-card h4 { font-size: 15px; font-weight: 700; color: #e8ecf1; margin: 20px 0 10px; letter-spacing: 0.02em; }
        .glass-card h4:first-child { margin-top: 0; }
        .glass-card p { margin-bottom: 12px; line-height: 1.7; }
        .glass-card p:last-child { margin-bottom: 0; }
        .glass-card ul { list-style: none; padding: 0; margin: 0 0 12px; }
        .glass-card li { position: relative; padding-left: 20px; margin-bottom: 8px; line-height: 1.6; }
        .glass-card li:last-child { margin-bottom: 0; }
        .glass-card li::before { content: ''; position: absolute; left: 6px; top: 9px; width: 5px; height: 5px; border-radius: 50%; background: #ed8d48; }
        .glass-card strong { color: #e8ecf1; font-weight: 600; }
    </style>
</head>
<body class="bg-pgr-dark text-pgr-text font-sans flex h-screen overflow-hidden">

    <div id="sidebar-wrapper" class="sidebar-wrapper" style="width: 288px;">
        <aside class="w-full bg-pgr-sidebar border-r border-pgr-border flex flex-col overflow-y-auto h-full">
            <div class="p-6 border-b border-pgr-border">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-pgr-orange flex items-center justify-center text-pgr-dark font-bold shadow-lg shadow-orange-500/20 text-xs">ПГР</div>
                        <div>
                            <h1 class="text-md font-semibold text-white tracking-tight">НАВИГАТОР.ПГР</h1>
                            <p class="text-xs text-pgr-muted">Документация</p>
                        </div>
                    </div>
                    <button onclick="toggleSidebar()" class="sidebar-toggle p-1 rounded hover:bg-white/5" title="Скрыть навигацию">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m11 17-5-5 5-5"/><path d="m18 17-5-5 5-5"/></svg>
                    </button>
                </div>
            </div>
            <nav id="sidebar-nav" class="flex flex-col gap-1 p-4 flex-1"></nav>
        </aside>
        <div id="resize-handle" class="resize-handle h-full" onmousedown="initResize(event)"></div>
    </div>
    <button id="sidebar-show-btn" onclick="toggleSidebar()" class="fixed left-0 top-20 z-30 p-2 bg-pgr-sidebar border border-pgr-border border-l-0 rounded-r-lg text-pgr-muted hover:text-pgr-orange transition-all hidden" title="Показать навигацию">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m13 17 5-5-5-5"/><path d="m6 17 5-5-5-5"/></svg>
    </button>

    <main class="flex-1 flex flex-col overflow-hidden min-w-0">
        <header class="h-16 bg-pgr-sidebar/80 backdrop-blur-md border-b border-pgr-border px-8 flex items-center justify-between shrink-0 relative z-[100]">
            <div class="flex items-center gap-1.5 bg-pgr-dark p-1 rounded-lg border border-pgr-border">
                <button class="role-btn active px-4 py-1.5 rounded-md text-sm font-medium text-gray-400" onclick="switchRole('home', this)">Главная</button>
                <button class="role-btn px-4 py-1.5 rounded-md text-sm font-medium text-gray-400" onclick="switchRole('user', this)">Диспетчер</button>
                <button class="role-btn px-4 py-1.5 rounded-md text-sm font-medium text-gray-400" onclick="switchRole('bort', this)">Борт</button>
                <button class="role-btn px-4 py-1.5 rounded-md text-sm font-medium text-gray-400" onclick="switchRole('admin', this)">Админ</button>
                <button class="role-btn px-4 py-1.5 rounded-md text-sm font-medium text-gray-400 flex items-center gap-1.5" onclick="switchRole('ai', this)">
                    <span class="w-2 h-2 rounded-full bg-pgr-orange animate-pulse"></span> AI
                </button>
            </div>
            <div class="relative w-72 z-50" id="searchContainer">
                <input id="searchInput" type="text" placeholder="Поиск по документу..." oninput="handleSearchDebounced(this.value)" onkeydown="onSearchKey(event)"
                    class="w-full bg-pgr-dark border border-pgr-border rounded-lg pl-4 pr-10 py-2 text-sm focus:outline-none focus:border-pgr-orange focus:ring-1 focus:ring-pgr-orange placeholder-pgr-muted transition-all">
                <button id="searchClear" onclick="clearSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 rounded text-pgr-muted hover:text-white hidden" title="Очистить">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
                <div id="searchDropdown" class="search-dropdown"></div>
            </div>
        </header>

        <div id="content-view" class="flex-1 overflow-y-auto">
            <div id="dynamic-content" class="max-w-6xl mx-auto px-8 py-10">
            </div>
        </div>

        <div id="chat-view" class="flex-1 flex flex-col hidden bg-pgr-sidebar/30">
            <div class="p-4 border-b border-pgr-border bg-pgr-sidebar/50 flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-pgr-orange/10 border border-pgr-orange/30 flex items-center justify-center text-pgr-orange font-bold text-xs">AI</div>
                <div>
                    <h3 class="text-sm font-semibold text-white">Ассистент АСУ ПГР</h3>
                    <p class="text-xs text-pgr-orange flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-pgr-orange animate-pulse"></span> Онлайн</p>
                </div>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-8 space-y-6">
                <div class="max-w-3xl mx-auto flex gap-4">
                    <div class="w-8 h-8 rounded-full bg-pgr-orange flex items-center justify-center text-pgr-dark font-bold text-xs shrink-0">AI</div>
                    <div class="chat-bubble-ai rounded-xl p-4 text-sm text-gray-300 max-w-[85%]">
                        Привет! Я AI-ассистент АСУ ПГР. Чем могу помочь?
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-pgr-border bg-pgr-sidebar">
                <div class="max-w-3xl mx-auto relative flex gap-3">
                    <input id="chat-input" type="text" placeholder="Задайте вопрос по системе АСУ ПГР..." onkeydown="if(event.key==='Enter') sendChat()"
                        class="flex-1 bg-pgr-card border border-pgr-border rounded-xl pl-4 pr-4 py-4 text-sm focus:outline-none focus:border-pgr-orange focus:ring-1 focus:ring-pgr-orange placeholder-pgr-muted transition-all">
                    <button onclick="sendChat()" class="px-5 py-2 bg-pgr-orange text-pgr-dark rounded-xl font-semibold text-sm hover:bg-orange-400 transition-colors">Отправить</button>
                </div>
            </div>
        </div>
    </main>

    <div id="img-modal" class="img-modal" onclick="closeImageModal()">
        <img id="img-modal-src" src="" alt="">
    </div>

    <script>
        let appData = null;
        let directoryData = null;
        let currentRole = 'user';
        let chatHistory = [];
        let currentChatId = null;
        let currentDirectoryKey = null;

        async function loadData() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                if (!res.ok) throw new Error('data.json error');
                appData = await res.json();
            } catch (e) {
                console.error('loadData', e);
                appData = { title: 'Документация', cards: {} };
            }
        }

        async function loadDirectoryData() {
            try {
                const res = await fetch('directory_data.json?t=' + Date.now());
                if (res.ok) directoryData = await res.json();
            } catch (e) { console.error('loadDirectoryData', e); }
        }

        function renderNavItem(item, level = 0) {
            const name = item.name || item;
            const anchor = item.anchor || item;
            const cls = level > 0 ? 'sidebar-link-child' : 'sidebar-link';
            const click = item.type === 'directory' ? `event.preventDefault(); showDirectory('${item.key}');` :
                          item.type === 'directory-back' ? `event.preventDefault(); showDirectory(null);` :
                          item.type === 'param' ? `event.preventDefault(); scrollToParam('${item.anchor}');` :
                          `event.preventDefault(); scrollToSection('${anchor}');`;
            const dataAttr = item.type === 'directory' ? `data-anchor="${item.key}"` :
                             item.anchor ? `data-anchor="${item.anchor}"` :
                             anchor ? `data-anchor="${anchor}"` : '';
            if (item.type === 'directory-back') {
                return `<a href="#" onclick="${click}" class="sidebar-link text-pgr-orange font-medium" style="color:#ed8d48"><span style="margin-right:6px">←</span>${name}</a>`;
            }
            let result = `<a href="#" ${dataAttr} onclick="${click}" class="sidebar-link ${cls}">${name}</a>`;
            if (item.children?.length) {
                result += '<div class="sidebar-group">';
                item.children.forEach(child => {
                    result += renderNavItem(child, level + 1);
                });
                result += '</div>';
            }
            return result;
        }

        function renderSidebar(role) {
            const nav = document.getElementById('sidebar-nav');
            let html = '';
            let sections = [];

            if (role === 'home') {
                const roleCards = [
                    { key: 'user', title: 'Диспетчер', desc: 'Оперативное планирование', icon: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>', color: '#ed8d48' },
                    { key: 'bort', title: 'Борт', desc: 'Бортовой терминал', icon: '<path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.38 6.06a1 1 0 0 0 0 1.88l8.79 3.88a2 2 0 0 0 1.66 0l8.79-3.88a1 1 0 0 0 0-1.88Z"/><path d="m2.38 11.94 8.79 3.88a2 2 0 0 0 1.66 0l8.79-3.88"/><path d="m2.38 17.06 8.79 3.88a2 2 0 0 0 1.66 0l8.79-3.88"/>', color: '#3b82f6' },
                    { key: 'admin', title: 'Администрирование', desc: 'Настройка системы', icon: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>', color: '#10b981' },
                    { key: 'ai', title: 'AI-ассистент', desc: 'Задать вопрос ИИ', icon: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>', color: '#8b5cf6' }
                ];
                html += '<p class="text-xs font-semibold text-pgr-muted uppercase tracking-wider mb-3 ml-3">Разделы</p>';
                roleCards.forEach(r => {
                    const btnIdx = r.key === 'user' ? 1 : r.key === 'bort' ? 2 : r.key === 'admin' ? 3 : 4;
                    html += `<div onclick="switchRole('${r.key}', document.querySelectorAll('.role-btn')[${btnIdx}])" class="mx-3 mb-2 p-3 rounded-lg cursor-pointer transition-all hover:bg-white/5 group" style="border: 1px solid rgba(255,255,255,0.04);">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-md flex items-center justify-center shrink-0" style="background: ${r.color}15; border: 1px solid ${r.color}30;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${r.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${r.icon}</svg>
                            </div>
                            <div class="min-w-0">
                                <div class="text-sm font-medium text-white group-hover:text-pgr-orange transition-colors truncate">${r.title}</div>
                                <div class="text-xs text-pgr-muted truncate">${r.desc}</div>
                            </div>
                        </div>
                    </div>`;
                });
                html += '<p class="text-xs font-semibold text-pgr-muted uppercase tracking-wider mt-5 mb-3 ml-3">Навигация</p>';
                html += `<div class="mx-3 mb-1"><a href="#" onclick="event.preventDefault(); scrollToSection('home-about');" class="sidebar-link text-sm">О руководстве</a></div>`;
                html += `<div class="mx-3 mb-1"><a href="#" onclick="event.preventDefault(); scrollToSection('home-roles');" class="sidebar-link text-sm">Выбор роли</a></div>`;
                html += `<div class="mx-3 mb-1"><a href="#" onclick="event.preventDefault(); scrollToSection('home-contents');" class="sidebar-link text-sm">Содержание</a></div>`;
            } else if (role === 'user' && appData?.cards?.quickstart) {
                sections = [];
                sections.push({ name: 'Быстрый старт', items: appData.cards.quickstart.steps.map((s, i) => ({
                    name: s.title,
                    anchor: `step-${i}`,
                    children: s.substeps?.slice(1).map((sub, si) => ({
                        name: (sub.text?.length > 40 ? sub.text.substring(0, 40) + '...' : sub.text) || `Подшаг ${si + 2}`,
                        anchor: `step-${i}-sub-${si + 1}`
                    })) || []
                })) });
                if (appData.cards.instructions?.length) {
                    sections.push({ name: 'Инструкции', items: appData.cards.instructions.map((instr, idx) => ({
                        name: instr.navTitle || instr.title,
                        anchor: `instr-${idx}`,
                        children: instr.steps?.map((s, si) => ({ name: (s.text?.length > 40 ? s.text.substring(0, 40) + '...' : s.text) || `Шаг ${si + 1}`, anchor: `instr-step-${idx}-${si}` })) || []
                    })) });
                }
            } else if (role === 'bort' && appData?.cards?.quickstart_bort) {
                sections = [{
                    name: 'Быстрый старт (Борт)',
                    items: appData.cards.quickstart_bort.steps.map((s, i) => ({
                        name: s.title,
                        anchor: `bort-step-${i}`,
                        children: s.substeps?.map((sub, si) => ({ name: (sub.text?.length > 40 ? sub.text.substring(0, 40) + '...' : sub.text) || `Подшаг ${si + 1}`, anchor: `bort-sub-${i}-${si}` })) || []
                    }))
                }];
            } else if (role === 'admin') {
                if (appData?.cards?.admin_instructions?.length) sections.push({
                    name: 'Администрирование',
                    items: appData.cards.admin_instructions.map((a, i) => ({
                        name: a.navTitle || a.title,
                        anchor: `admin-instr-${i}`,

        function formatDetails(details) {
            if (!details?.length) return '';
            let html = '<div class="mt-3">';
            let warningBlock = [];
            let inWarningBlock = false;

            details.forEach((line, index) => {
                const trimmed = line.trim();

                if (!trimmed) {
                    if (inWarningBlock && warningBlock.length > 0) {
                        html += `<div class="my-3 pl-4 border-l-2 border-pgr-orange bg-pgr-orange/5 rounded-r-lg py-3 space-y-1">${warningBlock.map(l => `<div class="text-sm text-pgr-text">${l}</div>`).join('')}</div>`;
                        warningBlock = [];
                        inWarningBlock = false;
                    }
                    html += '<div class="h-3"></div>';
                    return;
                }

                if (trimmed.startsWith('⚠️')) {
                    const text = trimmed.substring(2).trim();
                    if (!inWarningBlock) inWarningBlock = true;
                    warningBlock.push(text);
                } else if (trimmed.startsWith('💡')) {
                    const text = trimmed.substring(2).trim();
                    html += `<div class="my-3 pl-4 border-l-2 border-pgr-orange bg-pgr-orange/5 rounded-r-lg py-3"><div class="text-sm text-pgr-text">💡 ${text}</div></div>`;
                } else {
                    if (inWarningBlock && warningBlock.length > 0) {
                        html += `<div class="my-3 pl-4 border-l-2 border-pgr-orange bg-pgr-orange/5 rounded-r-lg py-3 space-y-1">${warningBlock.map(l => `<div class="text-sm text-pgr-text">${l}</div>`).join('')}</div>`;
                        warningBlock = [];
                        inWarningBlock = false;
                    }

                    if (trimmed.startsWith('—') || trimmed.startsWith('-') || trimmed.startsWith('▸')) {
                        const text = trimmed.substring(1).trim();
                        html += `<div class="flex gap-2 pl-5 text-sm text-pgr-text leading-relaxed"><span class="text-pgr-orange shrink-0 mt-0.5">▸</span><span>${text}</span></div>`;
                    } else if (trimmed.startsWith('•')) {
                        const text = trimmed.substring(1).trim();
                        html += `<div class="flex gap-2 pl-8 text-sm text-pgr-text leading-relaxed"><span class="text-pgr-orange shrink-0 mt-0.5">•</span><span>${text}</span></div>`;
                    } else if (/^\d+\./.test(trimmed)) {
                        const m = trimmed.match(/^(\d+\.\s*)(.+)/);
                        if (m) {
                            html += `<div class="mt-4 mb-1 text-sm leading-relaxed"><span class="text-pgr-orange font-semibold">${m[1]}</span><span class="text-white font-medium">${m[2]}</span></div>`;
                        } else {
                            html += `<div class="mt-4 mb-1 text-sm text-white font-medium leading-relaxed">${trimmed}</div>`;
                        }
                    } else if (trimmed.startsWith('<')) {
                        if ((trimmed.includes("class='step-images'") || trimmed.includes('class="step-images"')) && trimmed.includes('<img')) {
                            const srcRegex = /<img[^>]*?src=(['"])([^'"]*)\1[^>]*?>/g;
                            const matches = [...trimmed.matchAll(srcRegex)];
                            if (matches.length > 0) {
                                html += '<div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">';
                                matches.forEach(m => {
                                    const src = m[2];
                                    html += `<div class="rounded-lg overflow-hidden border border-pgr-border cursor-pointer hover:border-pgr-orange transition-colors bg-pgr-dark flex items-center justify-center" onclick="openImageModal('${src}')"><img src="${src}" loading="lazy" class="w-full h-48 object-contain" alt="" onerror="this.style.display='none'"></div>`;
                                });
                                html += '</div>';
                            }
                        } else {
                            html += trimmed;
                        }
                    } else {
                        html += `<div class="text-sm text-pgr-text leading-relaxed">${trimmed}</div>`;
                    }
                }

                if (index === details.length - 1 && inWarningBlock && warningBlock.length > 0) {
                    html += `<div class="my-3 pl-4 border-l-2 border-pgr-orange bg-pgr-orange/5 rounded-r-lg py-3 space-y-1">${warningBlock.map(l => `<div class="text-sm text-pgr-text">${l}</div>`).join('')}</div>`;
                }
            });

            html += '</div>';
            html = html.replace(/<img\s+([^>]*?)src=(['"])([^'"]*)\2([^>]*?)>/g, (match, before, quote, src, after) => {
                if (match.includes('onclick=')) return match;
                return `<img ${before}src=${quote}${src}${quote}${after} onclick="openImageModal('${src}')" style="cursor:pointer;" onerror="this.style.display='none'">`;
            });
            html = html.replace(/(\(ТРЕБУЕТСЯ УТОЧНЕНИЯ.*?\)|\(От балды.*?\)|\(под вопросом.*?\)|\(дополнить.*?\))/gi, '<span style="color:#ef4444;font-weight:600;">$1</span>');
            return html;
        }

        function updateActiveNav() {
            const contentView = document.getElementById('content-view');

            const validAnchors = new Set();
            document.querySelectorAll('.sidebar-link[data-anchor]').forEach(link => validAnchors.add(link.dataset.anchor));
            let bestId = null;
            let bestOffset = -Infinity;
            const threshold = contentView.scrollTop + 120;
            validAnchors.forEach(anchor => {
                const el = document.getElementById(anchor);
                if (!el) return;
                const offset = el.offsetTop;
                if (offset <= threshold && offset > bestOffset) {
                    bestOffset = offset;
                    bestId = anchor;
                }
            });
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.classList.toggle('nav-active', link.dataset.anchor === bestId);
            });
        }

            const contentView = document.getElementById('content-view');

        function highlightQuery(text, query) {
            if (!query) return text;
            const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const re = new RegExp('(' + esc + ')', 'gi');
            return text.replace(re, '<span class="search-dropdown-query">$1</span>');
        }

        function handleSearch(query) {
            const dropdown = document.getElementById('searchDropdown');
            const clearBtn = document.getElementById('searchClear');
            const q = query.trim();
            clearBtn.classList.toggle('hidden', !q);
            if (!q) { dropdown.classList.remove('active'); return; }

            const qLower = q.toLowerCase();
            const searchTerms = qLower.split(/\s+/).filter(t => t.length > 0);
            
            // Score each item based on how many search terms it contains
            const scoredItems = searchIndex.map(item => {
                let score = 0;
                const text = item.text;
                const title = item.originalTitle.toLowerCase();
                
                searchTerms.forEach(term => {
                    // Exact match in title gets highest score
                    if (title === term) {
                        score += 100;
                    }
                    // Title starts with term
                    else if (title.startsWith(term)) {
                        score += 50;
                    }
                    // Title contains term as whole word
                    else if (new RegExp('\\b' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i').test(title)) {
                        score += 40;
                    }
                    // Title contains term
                    else if (title.includes(term)) {
                        score += 30;
                    }
                    // Text contains term as whole word
                    else if (new RegExp('\\b' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i').test(text)) {
                        score += 15;
                    }
                    // Text contains term
                    else if (text.includes(term)) {
                        score += 10;
                    }
                });
                
                // Bonus for matching all terms
                if (searchTerms.length > 1) {
                    const allMatch = searchTerms.every(term => text.includes(term) || title.includes(term));
                    if (allMatch) score += 20;
                }
                
                return { item, score };
            }).filter(({ score }) => score > 0);
            
            // Sort by score (highest first) and take top 50
            scoredItems.sort((a, b) => b.score - a.score);
            const matches = scoredItems.slice(0, 50).map(({ item }) => item);

            if (!matches.length) {
                dropdown.innerHTML = `<div class="search-dropdown-empty">По запросу «<span class="search-dropdown-query">${q}</span>» ничего не найдено</div>`;
                dropdown.classList.add('active');
                return;
            }

            // Group by role
            const roleNames = { home: 'Главная', user: 'Диспетчер', bort: 'Борт', admin: 'Администрирование' };
            const roleIcons = { home: '📖', user: '⚡', bort: '📡', admin: '⚙️' };
            const groups = {};
            matches.forEach(m => {
                const roleLabel = roleNames[m.role] || m.role;
                if (!groups[roleLabel]) groups[roleLabel] = [];
                groups[roleLabel].push(m);
            });

            let html = '';
            // Add results count
            html += `<div class="search-dropdown-group"><div class="search-dropdown-group-title">Найдено результатов: ${matches.length}</div></div>`;
            
            Object.entries(groups).forEach(([roleLabel, items]) => {
                html += `<div class="search-dropdown-group">`;
                html += `<div class="search-dropdown-group-title">${roleLabel} (${items.length})</div>`;
                items.forEach(item => {
                    const displayTitle = highlightQuery(item.originalTitle, q);
                    html += `<div onclick="navigateToSearchResult(${item.id})" class="search-dropdown-item">
                        <div class="search-dropdown-item-text">
                            <div class="search-dropdown-item-title">${displayTitle}</div>
                            <div class="search-dropdown-item-meta">${item.category}</div>
                        </div>
                    </div>`;
                });
                html += `</div>`;
            });

            dropdown.innerHTML = html;
            dropdown.classList.add('active');
        }

        function navigateToSearchResult(id) {
            const item = searchIndex.find(i => i.id === id);
            if (!item) return;
            const query = document.getElementById('searchInput').value.trim();
            clearSearch();
            document.getElementById('searchDropdown').classList.remove('active');

            // Switch role
            if (item.role === 'ai') return;
            const roleBtnMap = { home: 0, user: 1, bort: 2, admin: 3 };
            const btnIdx = roleBtnMap[item.role] ?? 1;
            const btn = document.querySelectorAll('.role-btn')[btnIdx];
            // Reset directory view when navigating to admin non-directory results
            if (item.role === 'admin' && !item.anchor.startsWith('dir-')) currentDirectoryKey = null;
            switchRole(item.role, btn);

            // Wait for render then scroll and highlight
            setTimeout(() => {
                const contentView = document.getElementById('content-view');
                const el = document.getElementById(item.anchor);
                if (el && contentView) {
                    const top = el.offsetTop - 20;
                    contentView.scrollTo({ top, behavior: 'smooth' });
                    // Flash highlight
                    el.style.transition = 'box-shadow 0.5s ease';
                    el.style.boxShadow = '0 0 0 2px rgba(237,141,72,0.5), 0 0 20px rgba(237,141,72,0.2)';
                    setTimeout(() => { el.style.boxShadow = ''; }, 2000);
                }
                // Highlight the actual search query text inside content
                if (query) {
                    highlightTextInContent(document.getElementById('dynamic-content'), query);
                }
            }, 350);
        }

        function highlightTextInContent(container, text) {
            if (!container || !text) return;
            clearSearchHighlights();
            const esc = text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const re = new RegExp('(' + esc + ')', 'gi');
            const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
            const nodes = [];
            while (walker.nextNode()) nodes.push(walker.currentNode);
            nodes.forEach(node => {
                const parts = node.textContent.split(re);
                if (parts.length <= 1) return;
                const frag = document.createDocumentFragment();
                parts.forEach((part, i) => {
                    if (i % 2 === 1) {
                        const span = document.createElement('span');
                        span.className = 'search-hl';
                        span.textContent = part;
                        frag.appendChild(span);
                    } else {
                        frag.appendChild(document.createTextNode(part));
                    }
                });
                node.parentNode.replaceChild(frag, node);
            });
        }

        function onSearchKey(e) {
            if (e.key === 'Escape') { clearSearch(); document.getElementById('searchDropdown').classList.remove('active'); }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchClear').classList.add('hidden');
            document.getElementById('searchDropdown').classList.remove('active');
            clearSearchHighlights();
            searchMatches = [];
            searchCurrentIndex = -1;
        }

        function nextSearchResult() {
            if (!searchMatches.length) return;
            if (searchCurrentIndex >= 0 && searchCurrentIndex < searchMatches.length) {
                searchMatches[searchCurrentIndex].classList.replace('search-hl-current', 'search-hl');
            }
            searchCurrentIndex = (searchCurrentIndex + 1) % searchMatches.length;
            searchMatches[searchCurrentIndex].classList.replace('search-hl', 'search-hl-current');
        }

        function prevSearchResult() {
            if (!searchMatches.length) return;
            if (searchCurrentIndex >= 0 && searchCurrentIndex < searchMatches.length) {
                searchMatches[searchCurrentIndex].classList.replace('search-hl-current', 'search-hl');
            }
            searchCurrentIndex = (searchCurrentIndex - 1 + searchMatches.length) % searchMatches.length;
            searchMatches[searchCurrentIndex].classList.replace('search-hl', 'search-hl-current');
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';

            const msgs = document.getElementById('chat-messages');
            msgs.innerHTML += `<div class="max-w-3xl mx-auto flex gap-4 justify-end"><div class="chat-bubble-user rounded-xl p-4 text-sm text-gray-300 max-w-[85%]">${text.replace(/</g,'&lt;')}</div><div class="w-8 h-8 rounded-full bg-pgr-muted flex items-center justify-center text-white font-bold text-xs shrink-0">Вы</div></div>`;
            msgs.innerHTML += `<div id="typing" class="max-w-3xl mx-auto flex gap-4"><div class="w-8 h-8 rounded-full bg-pgr-orange flex items-center justify-center text-pgr-dark font-bold text-xs shrink-0">AI</div><div class="chat-bubble-ai rounded-xl p-4 text-sm text-gray-300"><span class="animate-pulse">Печатает...</span></div></div>`;
            msgs.scrollTop = msgs.scrollHeight;

            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text, chat_id: currentChatId || undefined })
                });
                const data = await res.json();
                document.getElementById('typing').remove();
                const reply = data.answer || data.response || data.message || 'Нет ответа от сервера';
                msgs.innerHTML += `<div class="max-w-3xl mx-auto flex gap-4"><div class="w-8 h-8 rounded-full bg-pgr-orange flex items-center justify-center text-pgr-dark font-bold text-xs shrink-0">AI</div><div class="chat-bubble-ai rounded-xl p-4 text-sm text-gray-300 max-w-[85%] whitespace-pre-wrap">${reply.replace(/</g,'&lt;')}</div></div>`;
            } catch (e) {
                document.getElementById('typing').remove();
                msgs.innerHTML += `<div class="max-w-3xl mx-auto flex gap-4"><div class="w-8 h-8 rounded-full bg-pgr-orange flex items-center justify-center text-pgr-dark font-bold text-xs shrink-0">AI</div><div class="chat-bubble-ai rounded-xl p-4 text-sm text-red-400 max-w-[85%]">Ошибка подключения к AI-серверу</div></div>`;
            }
            msgs.scrollTop = msgs.scrollHeight;
        }

        function scrollToSection(anchor) {
            const contentView = document.getElementById('content-view');
            const el = document.getElementById(anchor);
            if (contentView && el) {
                const top = el.offsetTop - 20;
                contentView.scrollTo({ top, behavior: 'smooth' });
            }
        }

        function scrollToParam(anchorId) {
            const contentView = document.getElementById('content-view');
            const el = document.getElementById(anchorId);
            if (contentView && el) {
                const wrap = el.closest('.dir-table-wrap');
                if (wrap) {
                    const top = el.offsetTop - 10;
                    wrap.scrollTo({ top, behavior: 'smooth' });
                } else {
                    const top = el.offsetTop - 20;
                    contentView.scrollTo({ top, behavior: 'smooth' });
                }
                el.style.background = 'rgba(237,141,72,0.15)';
                setTimeout(() => { el.style.background = ''; }, 1500);
            }
        }

        function toggleSidebar() {
            const wrapper = document.getElementById('sidebar-wrapper');
            const showBtn = document.getElementById('sidebar-show-btn');
            if (wrapper.classList.contains('collapsed')) {
                wrapper.classList.remove('collapsed');
                showBtn.classList.add('hidden');
            } else {
                wrapper.classList.add('collapsed');
                showBtn.classList.remove('hidden');
            }
        }

        let isResizing = false;
        function initResize(e) {
            isResizing = true;
            const wrapper = document.getElementById('sidebar-wrapper');
            const handle = document.getElementById('resize-handle');
            handle.classList.add('resizing');
            const startX = e.clientX;
            const startWidth = wrapper.offsetWidth;

            function onMouseMove(e) {
                if (!isResizing) return;
                const newWidth = startWidth + (e.clientX - startX);
                if (newWidth >= 200 && newWidth <= 500) {
                    wrapper.style.width = newWidth + 'px';
                    wrapper.style.transition = 'none';
                }
            }

            function onMouseUp() {
                isResizing = false;
                handle.classList.remove('resizing');
                wrapper.style.transition = '';
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        function showDirectory(key) {
            currentDirectoryKey = key || null;
            if (currentRole !== 'admin') {
                switchRole('admin', document.querySelectorAll('.role-btn')[2]);
            } else {
                renderSidebar('admin');
                renderContent('admin');
                const contentView = document.getElementById('content-view');
                if (contentView) contentView.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function createNewChat() {
            document.getElementById('chat-messages').innerHTML = `
                <div class="max-w-3xl mx-auto flex gap-4">
                    <div class="w-8 h-8 rounded-full bg-pgr-orange flex items-center justify-center text-pgr-dark font-bold text-xs shrink-0">AI</div>
                    <div class="chat-bubble-ai rounded-xl p-4 text-sm text-gray-300 max-w-[85%]">Привет! Я AI-ассистент АСУ ПГР. Чем могу помочь?</div>
                </div>`;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadData();
            await loadDirectoryData();
            buildSearchIndex();
            const defaultBtn = document.querySelector('.role-btn.active');
            switchRole('home', defaultBtn);
        });

        document.addEventListener('click', (e) => {
            const container = document.getElementById('searchContainer');
            if (container && !container.contains(e.target)) {
                document.getElementById('searchDropdown').classList.remove('active');
            }
        });
    </script>
</body>
</html>
