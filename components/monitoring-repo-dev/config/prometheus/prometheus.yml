global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
  
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
  
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
  
  # NanoMQ Prometheus endpoint (requires basic auth)
  - job_name: 'nanomq'
    metrics_path: '/api/v4/prometheus'
    basic_auth:
      username: 'admin'
      password: 'public'
    static_configs:
      - targets: ['172.17.0.1:8081']
  
  - job_name: 'ekuiper'
    static_configs:
      - targets: ['172.17.0.1:20499']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

