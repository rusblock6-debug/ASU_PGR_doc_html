  # Trip Service Server - HTTP API + основной процесс (gunicorn из start.sh) 
  # Серверный режим для управления всеми машинами
  trip-service-server:
    <<: *trip-service-template
    container_name: dispatching-server-trip-service
    ports:
      - "${TRIP_SERVICE_SERVER_PORT:-8003}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nanomq-server:
        condition: service_started
      enterprise-service:
        condition: service_healthy
      rabbitmq-server:
        condition: service_started
    command: ["sh", "start.sh"]
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Trip Transport Library Server - только FastStream/RabbitMQ consumer (без HTTP)
  trip-transport-service-server:
    <<: *trip-service-template
    container_name: dispatching-transport-service-server
    depends_on:
      rabbitmq-server:
        condition: service_started
    command: ["sh", "start.broker.sh", "server"]
    restart: unless-stopped
    networks:
      - dispatching-server-network

  # Sync Service Server - синхронизация сообщений между сервисами
  sync-service:
    build:
      context: ../repos/sync-service
      dockerfile: Dockerfile
      args:
        MODE: ${SYNC_SERVICE_SERVER_MODE:-dev}
    # container_name: dispatching-server-sync-service
    restart: unless-stopped
    environment:
      INSTANCE_ID: ${SYNC_SERVICE_SERVER_INSTANCE_ID:-server}
      MODE: ${SYNC_SERVICE_SERVER_MODE:-dev}
      LOG_LEVEL: ${SYNC_SERVICE_SERVER_LOG_LEVEL:-DEBUG}
      DEBUG_MODE: ${SYNC_SERVICE_SERVER_DEBUG_MODE:-1}
      MULTI_REPLICA_MODE: ${SYNC_SERVICE_SERVER_MULTI_REPLICA_MODE:-1}
      REMOTE_INSTANCES: ${SYNC_SERVICE_SERVER_REMOTE_INSTANCES:-bort_4,bort_9,bort_17,bort_22}
      REDIS_URL: ${SYNC_SERVICE_SERVER_REDIS_URL:-redis://redis:6379/1}
      MQTT_BROKER_HOST: ${SYNC_SERVICE_SERVER_MQTT_BROKER_HOST:-nanomq-server}
      MQTT_BROKER_PORT: ${SYNC_SERVICE_SERVER_MQTT_BROKER_PORT:-1883}
      AUTOREPUB_MQTT_BROKER_HOST: ${SYNC_SERVICE_SERVER_AUTOREPUB_MQTT_BROKER_HOST:-nanomq-server}
      AUTOREPUB_MQTT_BROKER_PORT: ${SYNC_SERVICE_SERVER_AUTOREPUB_MQTT_BROKER_PORT:-1883}
      RABBITMQ_DSN: ${SYNC_SERVICE_SERVER_RABBITMQ_DSN:-amqp://sync_service_user:sync_service_pass@rabbitmq-server:5672/}
    deploy:
      replicas: 1
    ports:
      # - "${SYNC_SERVICE_SERVER_PORT:-8007}:8000"
      - "${SYNC_SERVICE_SERVER_PORT:-8010-8014}:8000"
    volumes:
      - ../repos/sync-service:/service/app
    depends_on:
      redis:
        condition: service_healthy
      nanomq-server:
        condition: service_started
      rabbitmq-server:
        condition: service_started
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000" # S3 API
      - "${MINIO_UI_PORT:-9001}:9001" # Web UI
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    networks:
      - dispatching-server-network

  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq-server:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command: [ "/setup.sh" ]
    volumes:
      - ./config/minio/setup_minio.sh:/setup.sh:ro
      - ./config/minio/buckets.json:/buckets.json:ro
    environment:
      MINIO_HOST: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
      BUCKET_CONFIG_FILE: /buckets.json
      EVENTS: "put"
      # AMQP target id (как раньше WEBHOOK_ARN_ID)
      AMQP_ARN_ID: PRIMARY

      # RabbitMQ connection
      AMQP_URL: "amqp://s3_minio_user:s3_minio_pass@rabbitmq-server:5672/"
      AMQP_EXCHANGE: "minio.events"
      AMQP_ROUTING_KEY: "minio.dump-service"
      AMQP_EXCHANGE_TYPE: "topic"
      AMQP_DURABLE: "on"
    networks:
      - dispatching-server-network

  # Dozzle - просмотр логов контейнеров
  dozzle:
    image: amir20/dozzle:latest
    container_name: dispatching-server-dozzle-server
    restart: unless-stopped
    ports:
      - "${DOZZLE_SERVER_PORT:-9998}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
      DOZZLE_FILTER: "name=dispatching-*"
    networks:
      - dispatching-server-network


  # analytics-service
  analytics-service:
    build:
      context: ../repos/analytics-service
      dockerfile: Dockerfile
    container_name: dispatching-server-analytics-service
    ports:
      - "${ANALYTICS_SERVICE_PORT:-8000}:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      MODE: dev

      # s3
      S3_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin123}
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION_NAME: us-east-1
      S3_BUCKET_NAME: dump-service

      # rabbitmq
      RABBIT_USER: analytics_service_user
      RABBIT_PASSWORD: analytics_service_pass
      RABBIT_HOST: rabbitmq-server
      RABBIT_PORT: 5672
      # click
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USERNAME: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DATABASE: default
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq-server:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - dispatching-server-network


  debezium-server-graph-service:
    image: debezium/server:3.0.0.Final
    container_name: debezium-server-graph-service
    depends_on:
      rabbitmq-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./config/debezium/graph-service/application.properties:/debezium/config/application.properties:ro
      - debezium_graph_data:/debezium/data
    networks:
      - dispatching-server-network


  debezium-server-enterprise-service:
    image: debezium/server:3.0.0.Final
    container_name: debezium-server-enterprise-service
    depends_on:
      rabbitmq-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./config/debezium/enterprise-service/application.properties:/debezium/config/application.properties:ro
      - debezium_enterprise_data:/debezium/data
    networks:
      - dispatching-server-network


  debezium-server-auth-service:
    image: debezium/server:3.0.0.Final
    container_name: debezium-server-auth-service
    depends_on:
      rabbitmq-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./config/debezium/auth-service/application.properties:/debezium/config/application.properties:ro
      - debezium_auth_data:/debezium/data
    networks:
      - dispatching-server-network


  wifi-event-dispatcher-server:
    image: ${WIFI_EVENT_DISPATCHER_SERVER_IMAGE:-registry.dmi-msk.ru/wifi-event-dispatcher}:${WIFI_EVENT_DISPATCHER_SERVER_TAG:-dev-latest}
    build:
      context: ../repos/wifi-event-dispatcher
      dockerfile: Dockerfile
    container_name: dispatching-wifi-event-dispatcher-server
    entrypoint: [ "/server" ]
    restart: unless-stopped
    environment:
      RABBIT_HOST: rabbitmq-server
      RABBIT_PORT: ${RABBITMQ_PORT_SERVER}
      RABBIT_USER: ${WIFI_RABBIT_USER}
      RABBIT_PASSWORD: ${WIFI_RABBIT_PASS}
      ENVIRONMENT: production
      SERVER_PORT: ${WIFI_GRPC_PORT}

    ports:
      - "${WIFI_GRPC_PORT}:${WIFI_GRPC_PORT}"
    depends_on:
      - rabbitmq-server
    networks:
      - dispatching-server-network

  # Auth Service Backend API
  auth-service-backend:
    build:
      context: ../repos/auth-service-backend
      dockerfile: Dockerfile
    container_name: dispatching-auth-backend
    restart: unless-stopped
    ports:
      - "${AUTH_BACKEND_PORT}:8000"
    environment:
      SECRET_KEY: ${AUTH_SERVICE_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      ALGORITHM: ${AUTH_JWT_ALGORITHM}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${AUTH_POSTGRES_DB}"
      MODE: ${AUTH_MODE}
    depends_on:
      - postgres
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Api Gateway
  api-gateway:
    build:
      context: ../repos/api-gateway
      dockerfile: Dockerfile
    container_name: dispatching-api-gateway
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT}:8000"
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3


networks:
  dispatching-server-network:
    driver: bridge

volumes:
  clickhouse-data:
  # trino-data:
  # superset-data:
  # airbyte-data:
  postgres-server-data:
  redis-server-data:
  nanomq-data:
  rabbitmq-server-data:
  minio_data:
  debezium_graph_data:
  debezium_enterprise_data:
  debezium_auth_data:
  vault_data:
  vault_state:
