
name: dispatching-server

x-trip-service-template: &trip-service-template
  build:
    context: ../repos/dispa-backend
    dockerfile: Dockerfile
    args:
      - CI_COMMIT_REF_SLUG=${CI_COMMIT_REF_SLUG}
      - CI_REGISTRY_USER=${CI_REGISTRY_USER}
      - CI_REGISTRY_PASSWORD=${CI_REGISTRY_PASSWORD}
  environment:
    SERVICE_MODE: server
    VEHICLE_ID: "+"  # Wildcard - слушать все vehicle_id
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: ${TRIP_POSTGRES_DB:-trip_service}
    POSTGRES_USER: ${POSTGRES_USER:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    REDIS_HOST: redis
    REDIS_PORT: 6379
    NANOMQ_HOST: nanomq-server
    NANOMQ_PORT: 1883
    ENTERPRISE_SERVICE_HOST: enterprise-service
    ENTERPRISE_SERVICE_PORT: 8001
    DEBUG: ${DEBUG:-false}
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
    TIMEZONE: ${TIMEZONE:-Europe/Moscow}

    # Transport library env
    RABBIT__HOST: rabbitmq-server
    RABBIT__PORT: 5672
    RABBIT__USER: ${RABBIT_TRANSPORT_USER}
    RABBIT__PASSWORD: ${RABBIT_TRANSPORT_PASSWORD}
    RABBIT__RETRY_MAX_ATTEMPTS: ${RETRY_MAX_ATTEMPTS}
    RABBIT__RETRY_BASE_DELAY_SEC: ${RETRY_BASE_DELAY_SEC}

services:


  client:
    container_name: dispatching-server-client
    build:
      context: ../repos/client
      dockerfile: Dockerfile
    environment:
      - APP_MODE=${APP_MODE:-dev}
    volumes:
      - ../repos/client:/app
    ports:
      - "5173:5173"
      - "80:80"
    expose:
      - "80" 
    depends_on:
      enterprise-service:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - dispatching-server-network

  enterprise-frontend-demo:
    container_name: dispatching-server-enterprise-frontend-demo
    build:
      context: ../repos/enterprise-frontend-demo
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: ${ENTERPRISE_FRONTEND_DEMO_NODE_ENV:-development}
    volumes:
      - ../repos/enterprise-frontend-demo:/app
      - /app/node_modules
    ports:
      - "${ENTERPRISE_FRONTEND_DEMO_PORT:-3001}:3000"
    depends_on:
      enterprise-service:
        condition: service_started
      graph-service-backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - dispatching-server-network


  # PostgreSQL - основная база данных для микросервисов
  postgres:
    image: dockerhub.timeweb.cloud/postgis/postgis:16-3.4-alpine
    container_name: dispatching-server-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT_SERVER:-5433}:5432"
    volumes:
      - postgres-server-data:/var/lib/postgresql/data
      - ./config/postgres/initdb_server:/docker-entrypoint-initdb.d
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dispatching-server-network

  # Redis - кэширование и pub/sub
  redis:
    image: dockerhub.timeweb.cloud/redis:7-alpine
    container_name: dispatching-server-redis
    restart: unless-stopped
    ports:
      # Для server режима используем порт 6380
      - "${REDIS_PORT_SERVER:-6380}:6379"
    volumes:
      - redis-server-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dispatching-server-network

  # Vault
  vault:
    build:
      context: ./config/vault
      dockerfile: Dockerfile
    container_name: dispatching-server-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      - VAULT_ADDR=http://0.0.0.0:8200
      - VAULT_API_ADDR=http://0.0.0.0:8200
    volumes:
       - ./config/vault:/vault/config
       - vault_data:/vault/file
       - vault_state:/vault/data
    cap_add:
      - IPC_LOCK
    networks:
      - dispatching-server-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8200/v1/sys/health" ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  #settings-server 
  settings-server:
    build:
      context: ../repos/settings-server
      dockerfile: Dockerfile
    container_name: dispatching-settings-service
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      VAULT_URL: ${VAULT_URL:-http://dispatching-server-vault:8200}
      BORT_NOTIFY_ENABLED: ${BORT_NOTIFY_ENABLED:-true}
      BORT_NOTIFY_URL_TEMPLATE: ${BORT_NOTIFY_URL_TEMPLATE:-http://host.docker.internal:8017/api/admin/sync/{vehicle_id}}
      BORT_NOTIFY_FORCE: ${BORT_NOTIFY_FORCE:-false}
      BORT_NOTIFY_TIMEOUT_SEC: ${BORT_NOTIFY_TIMEOUT_SEC:-5}
      BORT_NOTIFY_MAX_ATTEMPTS: ${BORT_NOTIFY_MAX_ATTEMPTS:-3}
      BORT_NOTIFY_RETRY_DELAY_SEC: ${BORT_NOTIFY_RETRY_DELAY_SEC:-2}
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - vault_state:/vault_state:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dispatching-server-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8006/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # NanoMQ - MQTT брокер с MQTT Bridge к бортовой ВМ
  nanomq-server:
    image: dockerhub.timeweb.cloud/emqx/nanomq:latest
    container_name: dispatching-server-nanomq
    restart: unless-stopped
    ports:
      - "${NANOMQ_MQTT_PORT_SERVER:-1884}:1883"
      - "${NANOMQ_WS_PORT_SERVER:-8084}:8083"
      - "${NANOMQ_ADMIN_PORT_SERVER:-8082}:8081"
    volumes:
      - ./config/nanomq/nanomq.server.conf:/etc/nanomq.conf.template:ro
      - nanomq-data:/opt/nanomq/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "1883"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dispatching-server-network

  rabbitmq-server:
    image: dockerhub.timeweb.cloud/rabbitmq:4.2-management-alpine
    container_name: dispatching-server-rabbitmq
    hostname: rabbitmq-server-node
    ports:
      - "${RABBITMQ_PORT_SERVER:-5672}:5672"  # AMQP
      - "${RABBITMQ_HTTP_PORT_SERVER:-15672}:15672"  # HTTP management UI
      - "${RABBITMQ_STREAM_PORT_SERVER:-5552}:5552"  # Stream protocol
    volumes:
      - rabbitmq-server-data:/var/lib/rabbitmq
      - ./config/rabbitmq/server/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./config/rabbitmq/server/rabbitmq.server.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./config/rabbitmq/server/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dispatching-server-network

  # Enterprise Service - основной микросервис
  enterprise-service:
    build:
      context: ../repos/enterprise-service
      dockerfile: Dockerfile
      args:
        - CI_COMMIT_REF_SLUG=${CI_COMMIT_REF_SLUG}
        - CI_REGISTRY_USER=${CI_REGISTRY_USER}
        - CI_REGISTRY_PASSWORD=${CI_REGISTRY_PASSWORD}
    container_name: dispatching-server-enterprise-service
    restart: unless-stopped
    environment:
      DEBUG: ${DEBUG:-false}
      HOST: "0.0.0.0"
      PORT: "8001"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/enterprise_db"
      REDIS_URL: "redis://redis:6379/0"
      TIMEZONE: ${TIMEZONE:-Europe/Moscow}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      NANOMQ_HOST: nanomq-server
      NANOMQ_MQTT_PORT: ${NANOMQ_MQTT_PORT:-1883}

    ports:
      - "${ENTERPRISE_SERVICE_PORT:-8002}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Telemetry Service - сбор и хранение телеметрии в Redis Streams
  telemetry-service:
    build:
      context: ../repos/telemetry-service
      dockerfile: Dockerfile
    container_name: dispatching-server-telemetry-service
    restart: unless-stopped
    environment:
      DEBUG: ${DEBUG:-false}
      HOST: "0.0.0.0"
      PORT: "8004"
      REDIS_URL: "redis://redis:6379/0"
      NANOMQ_HOST: "nanomq-server"
      NANOMQ_MQTT_PORT: ${NANOMQ_MQTT_PORT:-1883}
      NANOMQ_WS_PORT: ${NANOMQ_WS_PORT:-8083}
      TELEMETRY_STREAM_TTL_SECONDS: ${TELEMETRY_STREAM_TTL_SECONDS:-7200}
      TIMEZONE: ${TIMEZONE:-Europe/Moscow}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${TELEMETRY_SERVICE_PORT:-8004}:8004"
    depends_on:
      redis:
        condition: service_healthy
      nanomq-server:
        condition: service_started
    volumes:
      - ../repos/telemetry-service:/app
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8004/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Graph Service Backend API - обработка графа маршрутов
  graph-service-backend:
    build:
      context: ../repos/graph-service-backend
      dockerfile: Dockerfile
    container_name: dispatching-server-graph-backend
    restart: unless-stopped
    environment:
      # Режим работы: "+" = сервер
      VEHICLE_ID: "+"
      # Список бортов для рассылки событий (через запятую)
      VEHICLE_IDS: ${VEHICLE_IDS:-4}
      # База данных
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${GRAPH_POSTGRES_DB:-dispatching_graph}
      # mqtt
      NANOMQ_HOST: ${SERVER_NANOMQ_HOST:-10.100.109.14}
      NANOMQ_MQTT_PORT: ${SERVER_NANOMQ_PORT:-1884}
      # GPS → Canvas трансформация
      ORIGIN_GPS_LAT: ${ORIGIN_GPS_LAT:-58.173161}
      ORIGIN_GPS_LON: ${ORIGIN_GPS_LON:-59.818738}
      ORIGIN_CANVAS_X: ${ORIGIN_CANVAS_X:-0}
      ORIGIN_CANVAS_Y: ${ORIGIN_CANVAS_Y:-0}
      ORIGIN_CANVAS_Z: ${ORIGIN_CANVAS_Z:-0}
      DEFAULT_VEHICLE_HEIGHT: ${DEFAULT_VEHICLE_HEIGHT:-0}
      # S3
      S3_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin123}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://10.100.109.14:9000}
      S3_BUCKET_NAME: graph-service
      S3_REGION_NAME: ${S3_REGION_NAME:-us-east-1}
      # Debug
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${GRAPH_BACKEND_SERVICE_PORT:-8005}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      nanomq-server:
        condition: service_started
    volumes:
      - ../repos/graph-service-backend:/app
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Graph Service Frontend
  graph-service-frontend:
    build:
      context: ../repos/graph-service-frontend
      dockerfile: Dockerfile
      args:
        # Передаем переменные окружения как build args для сборки React приложения
        REACT_APP_ENTERPRISE_SERVICE_HOST: ${REACT_APP_ENTERPRISE_SERVICE_HOST:-10.100.109.14}
        REACT_APP_ENTERPRISE_SERVICE_PORT: ${REACT_APP_ENTERPRISE_SERVICE_PORT:-8002}
        REACT_APP_GARAGE_LAT: ${REACT_APP_GARAGE_LAT:-58.170120}
        REACT_APP_GARAGE_LON: ${REACT_APP_GARAGE_LON:-59.829150}
        REACT_APP_GARAGE_HEIGHT: ${REACT_APP_GARAGE_HEIGHT:-800}
        REACT_APP_MODE: ${REACT_APP_MODE:-server}
    container_name: dispatching-server-graph-frontend
    restart: unless-stopped
    ports:
      - "${GRAPH_FRONTEND_SERVICE_PORT:-3003}:80"
    environment:
      BACKEND_HOST: graph-service-backend
      BACKEND_PORT: 5000
    depends_on:
      - graph-service-backend
      - enterprise-service
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: dispatching-clickhouse
    restart: unless-stopped
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-dispatching}
    networks:
      - dispatching-server-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

