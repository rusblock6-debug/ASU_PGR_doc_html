default:
  tags:
    - infra-cluster

stages:
  - lock_check
  - deploy
  - notify

variables:
  DEV_DEPLOY_ENVS: "dispa-bort dispa-bort2 dispa-bort3 dispa-bort4 dispa-server"
  STAGE_DEPLOY_ENVS: "dispa-stage-bort-1 dispa-stage-bort-2 dispa-stage-server"
  TELEGRAM_BOT_TOKEN: "8497465232:AAHPtZ73og27ult9gv681QWSgLMY7FlAyfM"
  TELEGRAM_CHAT_ID: "-1003429356878"

generate_deploy:
  stage: lock_check
  image: ${CI_REGISTRY_BASE}/base-images:curl-9a025b9a
  script:
    - |
      set -euo pipefail

      if [ -z "${TRIGGERED_BRANCH:-}" ]; then
        DEPLOY_ENVS="${DEV_DEPLOY_ENVS} ${STAGE_DEPLOY_ENVS}"
      elif [ "${TRIGGERED_BRANCH}" = "staging" ]; then
        DEPLOY_ENVS="${STAGE_DEPLOY_ENVS}"
      else
        DEPLOY_ENVS="${DEV_DEPLOY_ENVS}"
      fi

      echo "stages:" > generated.yml
      echo "  - deploy" >> generated.yml

      for ENV in ${DEPLOY_ENVS}; do
        echo "===> Проверяю $ENV"
        RESP=$(curl -sk --max-time 5 "https://deploy-lock.dmi-msk.ru/api/envs/${ENV}/status" || true)
        STATUS=$(echo "$RESP" | jq -r '.status' 2>/dev/null || echo "")
        MSG=$(echo "$RESP" | jq -r '.message' 2>/dev/null || true)
        [ -n "$MSG" ] && echo "$MSG"

        if [ "$STATUS" = "1" ]; then
          echo "  -> разрешён"
          {
            echo "${ENV}:"
            echo "  stage: deploy"
            echo "  extends: .deploy_template_${ENV}"
          } >> generated.yml
        else
          echo "  -> заблокирован"
        fi
      done

      echo "----- generated.yml -----"
      cat generated.yml
  artifacts:
    when: always
    paths:
      - generated.yml
    expire_in: 1h
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'

run_deploys:
  stage: deploy
  needs: ["generate_deploy"]
  trigger:
    include:
      - artifact: generated.yml
        job: generate_deploy
      - local: .gitlab-ci-deploy-templates.yml
    strategy: depend
    forward:
      pipeline_variables: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'


# Уведомление об успешном деплое
notify_success:
  stage: notify
  image: ${CI_REGISTRY_BASE}/base-images:curl-9a025b9a
  needs:
    - job: run_deploys
  script:
    - |
      MESSAGE="✅ Все компоненты *Диспетчеризации* обновлены (Серверная часть ➕ борты)"
      curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "text=${MESSAGE}" \
        -d "parse_mode=Markdown"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: on_success

# Уведомление о неудачном деплое
notify_failure:
  stage: notify
  image: ${CI_REGISTRY_BASE}/base-images:curl-9a025b9a
  script:
    - |
      set +e
      # Получаем child pipeline ID
      CHILD_PIPELINE_ID=$(curl -sk --header "PRIVATE-TOKEN: ${GIT_BOT_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/pipelines/${CI_PIPELINE_ID}/bridges" \
        | jq -r '.[0].downstream_pipeline.id // empty')
      
      MESSAGE="❗️ Проблема при деплое *Диспетчеризации*"
      
      if [ -n "$CHILD_PIPELINE_ID" ]; then
        # Получаем информацию о failed job
        FAILED_JOB_JSON=$(curl -sk --header "PRIVATE-TOKEN: ${GIT_BOT_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/pipelines/${CHILD_PIPELINE_ID}/jobs?scope[]=failed")
        
        JOB_NAME=$(echo "$FAILED_JOB_JSON" | jq -r '.[0].name // empty' 2>/dev/null)
        JOB_ID=$(echo "$FAILED_JOB_JSON" | jq -r '.[0].id // empty' 2>/dev/null)
        JOB_TAGS=$(echo "$FAILED_JOB_JSON" | jq -r '.[0].tag_list | join(", ") // empty' 2>/dev/null)
        
        if [ -n "$JOB_NAME" ] && [ -n "$JOB_ID" ]; then
          JOB_URL="${CI_PROJECT_URL}/-/jobs/${JOB_ID}"
          MESSAGE="${MESSAGE}\n\n${JOB_NAME} (tags: ${JOB_TAGS})\n${JOB_URL}"
        fi
      fi
      
      curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "text=${MESSAGE}" \
        -d "parse_mode=Markdown"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
      when: on_failure
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: on_failure
