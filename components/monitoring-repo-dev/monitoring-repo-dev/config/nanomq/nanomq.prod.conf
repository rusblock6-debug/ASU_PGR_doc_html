## NanoMQ Production Configuration

mqtt {
    port = 1883
    max_connections = 1024000
    max_packet_size = 10MB
    keepalive_backoff = 1.25
}

websocket {
    enable = true
    port = 8083
    path = "/mqtt"
}

http_server {
    enable = true
    port = 8081
    username = "admin"
    password = "${NANOMQ_ADMIN_PASSWORD}"
}

log {
    to = [file]
    level = warning
    dir = "/var/log/nanomq"
    file = "nanomq.log"
    rotation {
        size = 50MB
        count = 10
    }
}

auth {
    allow_anonymous = false
    ## Настройте аутентификацию в production
}
