.deploy_base:
  stage: deploy
  variables:
    GIT_STRATEGY: "none"
    BORT_DEPLOY_CMD: "dev-bort"
  script:
    - |
      set -Eeuo pipefail
      export DOCKER_BUILDKIT=1 COMPOSE_DOCKER_CLI_BUILD=1

      if [ -n "${TRIGGERED_COMMIT:-}" ] && [ -z "${SERVICE_NAME:-}" ]; then
        echo "===> Триггер без SERVICE_NAME - пропускаем"
        exit 0
      fi

      if [ -n "${TARGET_ENV:-}" ] && [ "${TARGET_ENV}" != "${DEPLOY_TYPE}" ]; then
        echo "===> TARGET_ENV=${TARGET_ENV} не совпадает с DEPLOY_TYPE=${DEPLOY_TYPE} - пропускаем"
        exit 0
      fi

      echo "===> Очистка старых /tmp/${CI_PROJECT_NAME}-*"
      find /tmp -maxdepth 1 -type d -name "${CI_PROJECT_NAME}-*" -exec rm -rf {} +

      TMP_CLONE="/tmp/${CI_PROJECT_NAME}-${CI_JOB_ID}"
      echo "Клонируем в: $TMP_CLONE (ветка: dev)"
      git clone -b "dev" https://${GIT_BOT}:${GIT_BOT_TOKEN}@git.dmi-msk.ru/retek.pgr/dispatching/${CI_PROJECT_NAME}.git "$TMP_CLONE"

      rm -rf /srv/${CI_PROJECT_NAME}
      mkdir -p /srv/${CI_PROJECT_NAME}
      rsync -a "$TMP_CLONE"/ /srv/${CI_PROJECT_NAME}/
      cd /srv/${CI_PROJECT_NAME}

      # Экспортируем ветку для clone-скриптов
      export DEPLOY_BRANCH="${DEPLOY_BRANCH:-dev}"

      # Определяем env файл
      ENV_FILE=".env_${DEPLOY_ENV}"

      # Если переданы IMAGE_REPO и IMAGE_TAG - обновляем .env файл
      if [ -n "${IMAGE_REPO:-}" ] && [ -n "${IMAGE_TAG:-}" ]; then
        echo "===> Обновление образа для ${SERVICE_NAME}: ${IMAGE_REPO}:${IMAGE_TAG}"
        chmod +x scripts/update-image-tag.sh
        ./scripts/update-image-tag.sh "${SERVICE_NAME}" "${IMAGE_REPO}" "${IMAGE_TAG}" "${ENV_FILE}"
      fi

      if [ -n "${SERVICE_NAME:-}" ] && [ -n "${REPO_NAME:-}" ]; then
        echo "===> Частичное обновление: сервис=${SERVICE_NAME}, репо=${REPO_NAME}"

        if [ "${DEPLOY_TYPE}" = "bort" ]; then
          docker image prune -f
          make init-bort
          if [ "${COMPOSE_TARGET:-}" = "settings-bort" ] || [ "${SERVICE_NAME}" = "settings-service" ]; then
            UPDATE_TARGET="update-settings-bort-service"
            PULL_TARGET="pull-and-restart-settings-bort-service"
          else
            UPDATE_TARGET="update-bort-service"
            PULL_TARGET="pull-and-restart-bort-service"
          fi
          # Если есть IMAGE_REPO/IMAGE_TAG - используем pull, иначе build
          if [ -n "${IMAGE_REPO:-}" ] && [ -n "${IMAGE_TAG:-}" ]; then
            make ${PULL_TARGET} SERVICE=${SERVICE_NAME} e=${DEPLOY_ENV}
          else
            make ${UPDATE_TARGET} SERVICE=${SERVICE_NAME} e=${DEPLOY_ENV}
          fi
        else
          docker image prune -f
          make init-server
          # Если есть IMAGE_REPO/IMAGE_TAG - используем pull, иначе build
          if [ -n "${IMAGE_REPO:-}" ] && [ -n "${IMAGE_TAG:-}" ]; then
            make pull-and-restart-server-service SERVICE=${SERVICE_NAME} ENV_FILE=${ENV_FILE}
          else
            make update-server-service SERVICE=${SERVICE_NAME} ENV_FILE=${ENV_FILE}
          fi
        fi
      else
        echo "===> Полное обновление всех сервисов"

        if [ "${DEPLOY_TYPE}" = "bort" ]; then
          echo "===> Инициализация бортовой части"
          docker image prune -f
          make ${BORT_DEPLOY_CMD} e=${DEPLOY_ENV}
        else
          echo "===> Установка режима production"
          export APP_MODE=prod
          echo "===> Инициализация серверной части"
          docker image prune -f
          make dev-server ENV_FILE=${ENV_FILE}
        fi

        echo "===> Инициализация мониторинга"
        make monitoring
      fi

