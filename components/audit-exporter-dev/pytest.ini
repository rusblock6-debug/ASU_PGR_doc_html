[pytest]
asyncio_mode = auto
pythonpath = .
markers =
    integration: integration tests requiring external services

filterwarnings =
    ignore:The @wait_container_is_ready decorator is deprecated:DeprecationWarning:testcontainers\.

addopts =
    -vv
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=xml
