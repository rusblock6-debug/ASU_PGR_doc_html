<!DOCTYPE html>
<html>
<head>
    <title>Создание переменных</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa, #e4edf5);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e6ed;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 2rem;
            color: #2c3e50;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            border: 1px solid #d0d9e6;
            border-radius: 8px;
            background: #f8fafc;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #5d87a1;
            box-shadow: 0 0 0 2px rgba(93, 135, 161, 0.2);
            background: #ffffff;
        }

        input:hover {
            border-color: #7a9eb3;
            background: #ffffff;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 14px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .btn-primary {
            flex: 1;
            background: linear-gradient(to right, #5d87a1, #7a9eb3);
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #555;
            padding: 0 20px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #5d87a1;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .back-link:hover {
            text-decoration: underline;
            color: #2c3e50;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(93, 135, 161, 0.3);
            border-radius: 50%;
            border-top-color: #5d87a1;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            padding: 15px;
            background: #fff5f5;
            border-radius: 8px;
            border: 1px solid #ffb3b3;
            color: #b86b6b;
            margin-bottom: 20px;
        }

        .success-message {
            display: none;
            padding: 15px;
            background: #f0f8f5;
            border-radius: 8px;
            border: 1px solid #a8d8bd;
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .sections-container {
            display: none;
        }

        .section {
            margin-bottom: 30px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e0e6ed;
        }

        .section-header {
            padding: 15px 20px;
            background: #eef3f8;
            font-weight: 600;
            color: #2c3e50;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .section-header:hover {
            background: #e2eaf2;
        }

        .section-content {
            padding: 20px;
            background: white;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 15px;
        }

        .form-row:last-child {
            margin-bottom: 0;
        }

        .form-field {
            flex: 1;
            min-width: 250px;
        }

        .field-name {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.95rem;
        }

        .required-mark {
            color: #b86b6b;
        }

        input::placeholder {
            color: #95a5a6;
            opacity: 0.8;
        }

        #specific-section input {
            background: #f8fafc;
        }

        #specific-section input:focus {
            background: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Создание переменных</h1>

        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>

        <div class="loading" id="template-loading">
            <div class="spinner"></div>
            <p>Загрузка шаблона переменных...</p>
        </div>

        <div class="sections-container" id="sections-container">
            <div class="section">
                <div class="section-header" onclick="toggleSection('specific-section')">
                    Уникальные переменные
                </div>
                <div class="section-content" id="specific-section">
                    <!-- Сюда будут добавлены поля specific -->
                </div>
            </div>

            <div class="section">
                <div class="section-header" onclick="toggleSection('vehicle-section')">
                    Переменные зависящие от VEHICLE_ID
                </div>
                <div class="section-content" id="vehicle-section">
                    <!-- Сюда будут добавлены поля vehicle_dependant -->
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn btn-primary" onclick="submitForm()">Создать переменные</button>
            <button class="btn btn-secondary" onclick="resetForm()">Сбросить</button>
        </div>

        <a href="/admin" class="back-link">← Вернуться в админ-панель</a>
    </div>

    <script>
        // Глобальные переменные
        let templateData = null;
        let specificFields = [];
        let vehicleFields = [];

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', function() {
            loadTemplate();
        });

        // Загрузка шаблона переменных
        function loadTemplate() {
            const templateLoading = document.getElementById('template-loading');
            const errorMessage = document.getElementById('error-message');

            errorMessage.style.display = 'none';
            templateLoading.style.display = 'flex';

            fetch('/api/secrets')
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(err => {
                            throw new Error(err.detail || 'Не удалось загрузить шаблон');
                        });
                    }
                    return response.json();
                })
                .then(data => {
                    templateData = data;
                    processTemplateData();
                })
                .catch(error => {
                    errorMessage.textContent = `Ошибка загрузки шаблона: ${error.message}`;
                    errorMessage.style.display = 'block';
                })
                .finally(() => {
                    templateLoading.style.display = 'none';
                });
        }

        // Обработка полученных данных шаблона
        function processTemplateData() {
            const specificSection = document.getElementById('specific-section');
            const vehicleSection = document.getElementById('vehicle-section');

            specificSection.innerHTML = '';
            vehicleSection.innerHTML = '';

            // Обработка specific переменных
            specificFields = [];
            if (templateData.specific && Object.keys(templateData.specific).length > 0) {
                const isNumericKeys = Object.keys(templateData.specific).every(key => /^\d+$/.test(key));

                if (isNumericKeys) {
                    Object.values(templateData.specific).forEach(value => {
                        const [key, val] = value.split('=');
                        specificFields.push({
                            key: key || value,
                            value: val || value
                        });
                    });
                } else {
                    Object.entries(templateData.specific).forEach(([key, value]) => {
                        specificFields.push({
                            key: key,
                            value: value
                        });
                    });
                }
            }

            // Обработка vehicle_dependant переменных
            vehicleFields = [];
            if (templateData.vehicle_dependant && Object.keys(templateData.vehicle_dependant).length > 0) {
                Object.entries(templateData.vehicle_dependant).forEach(([key, value]) => {
                    vehicleFields.push({
                        key: key,
                        value: value
                    });
                });
            }

            renderFields(specificSection, specificFields, true);
            renderFields(vehicleSection, vehicleFields, false);

            document.getElementById('sections-container').style.display = 'block';
        }

        // Рендеринг полей в секции
        function renderFields(container, fields, isSpecificSection) {
            if (fields.length === 0 && !isSpecificSection) {
                container.innerHTML = '<p>Нет переменных для отображения</p>';
                return;
            }

            if (isSpecificSection) {
                container.innerHTML = '';

                // Добавляем поле VEHICLE_ID
                const vehicleIdRow = document.createElement('div');
                vehicleIdRow.className = 'form-row';
                vehicleIdRow.innerHTML = `
                    <div class="form-field">
                        <div class="field-name">
                            VEHICLE_ID
                            <span class="required-mark">*</span>
                        </div>
                        <input
                            type="text"
                            id="vehicle-id-input"
                            placeholder="Введите VEHICLE_ID"
                            value=""
                            required
                            oninput="updateVehicleFields()"
                        >
                    </div>
                `;
                container.appendChild(vehicleIdRow);

                // Добавляем остальные specific поля
                fields.forEach(field => {
                    if (field.key !== 'VEHICLE_ID') {
                        const fieldElement = document.createElement('div');
                        fieldElement.className = 'form-row';
                        fieldElement.innerHTML = `
                            <div class="form-field">
                                <div class="field-name">
                                    ${field.key}
                                    <span class="required-mark">*</span>
                                </div>
                                <input
                                    type="text"
                                    id="field-${field.key}"
                                    placeholder="Введите значение"
                                    value=""
                                    required
                                >
                            </div>
                        `;
                        container.appendChild(fieldElement);
                    }
                });
            } else {
                container.innerHTML = '';
                fields.forEach(field => {
                    const fieldElement = document.createElement('div');
                    fieldElement.className = 'form-row';

                    // Сохраняем оригинальное значение с {VEHICLE_ID}
                    const originalValue = field.value || '';
                    const fieldId = `field-${field.key}`;

                    fieldElement.innerHTML = `
                        <div class="form-field">
                            <div class="field-name">
                                ${field.key}
                                <span class="required-mark">*</span>
                            </div>
                            <input
                                type="text"
                                id="${fieldId}"
                                data-original-value="${originalValue}"
                                placeholder="Введите значение"
                                value="${originalValue}"
                                required
                            >
                        </div>
                    `;
                    container.appendChild(fieldElement);
                });
            }
        }

        // Функция для обновления полей во втором блоке при изменении VEHICLE_ID
        function updateVehicleFields() {
            const vehicleId = document.getElementById('vehicle-id-input')?.value || '';
            const vehicleSection = document.getElementById('vehicle-section');

            if (!vehicleSection) return;

            const inputs = vehicleSection.querySelectorAll('input[data-original-value]');
            inputs.forEach(input => {
                const originalValue = input.getAttribute('data-original-value') || '';
                // Если VEHICLE_ID не пустой, подставляем его, иначе показываем исходное значение с {VEHICLE_ID}
                if (vehicleId) {
                    input.value = originalValue.replace(/{VEHICLE_ID}/g, vehicleId);
                } else {
                    input.value = originalValue;
                }
            });
        }

        // Переключение секций
        function toggleSection(sectionId) {
            const section = document.getElementById(sectionId);
            if (section.style.display === 'none') {
                section.style.display = 'block';
            } else {
                section.style.display = 'none';
            }
        }

        // Сбор данных формы
        function collectFormData() {
            const vehicleId = document.getElementById('vehicle-id-input')?.value.trim() || '';
            const formData = {
                vehicle_id: vehicleId,
                variables: {}  // Здесь будут все переменные
            };

            // Добавляем VEHICLE_ID в variables
            if (vehicleId) {
                formData.variables['VEHICLE_ID'] = vehicleId;
            }

            // Сбор specific переменных (кроме VEHICLE_ID)
            specificFields.forEach(field => {
                if (field.key !== 'VEHICLE_ID') {
                    const value = document.getElementById(`field-${field.key}`)?.value.trim();
                    if (value && value !== '') {
                        formData.variables[field.key] = value;
                    }
                }
            });

            // Сбор vehicle_dependant переменных
            vehicleFields.forEach(field => {
                const value = document.getElementById(`field-${field.key}`)?.value.trim();
                if (value) {
                    formData.variables[field.key] = value;
                }
            });

            console.log('Собранные данные:', formData); // Для отладки
            return formData;
        }

        // Валидация формы
        function validateForm(formData) {
            const errorMessage = document.getElementById('error-message');
            errorMessage.style.display = 'none';

            if (!formData.vehicle_id || isNaN(formData.vehicle_id) || formData.vehicle_id <= 0) {
                errorMessage.textContent = 'Пожалуйста, введите корректный числовой VEHICLE_ID (больше 0)';
                errorMessage.style.display = 'block';
                return false;
            }

            const missingFields = [];

            if (!formData.variables['VEHICLE_ID']) {
                missingFields.push('VEHICLE_ID');
            }

            specificFields.forEach(field => {
                if (field.key !== 'VEHICLE_ID') {
                    const value = document.getElementById(`field-${field.key}`)?.value.trim();
                    if (!value || value === '') {
                        missingFields.push(field.key);
                    }
                }
            });

            vehicleFields.forEach(field => {
                const value = document.getElementById(`field-${field.key}`)?.value.trim();
                if (!value) {
                    missingFields.push(field.key);
                }
            });

            if (missingFields.length > 0) {
                errorMessage.innerHTML = `Пожалуйста, заполните обязательные поля: <strong>${missingFields.join(', ')}</strong>`;
                errorMessage.style.display = 'block';
                return false;
            }

            return true;
        }

        // Отправка формы
        function submitForm() {
            const formData = collectFormData();

            if (!validateForm(formData)) return;

            const loading = document.createElement('div');
            loading.className = 'loading';
            loading.innerHTML = `
                <div class="spinner"></div>
                <p>Создание переменных...</p>
            `;

            const container = document.querySelector('.container');
            container.insertBefore(loading, document.querySelector('.btn-container'));

            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');

            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            // Формируем тело запроса
            const requestBody = {
                variables: formData.variables
            };

            console.log('Отправляемые данные:', requestBody); // Для отладки

            fetch(`/api/secrets/${formData.vehicle_id}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => {
                        throw new Error(err.detail || 'Не удалось создать переменные');
                    });
                }
                return response.json();
            })
            .then(data => {
                successMessage.innerHTML = `Переменные для VEHICLE_ID <strong>${formData.vehicle_id}</strong> успешно созданы`;
                successMessage.style.display = 'block';

                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 5000);
            })
            .catch(error => {
                errorMessage.textContent = `Ошибка создания: ${error.message}`;
                errorMessage.style.display = 'block';
            })
            .finally(() => {
                container.removeChild(loading);
            });
        }

        // Сброс формы
        function resetForm() {
            const vehicleIdInput = document.getElementById('vehicle-id-input');
            if (vehicleIdInput) {
                vehicleIdInput.value = '';
            }

            // Сброс specific полей
            specificFields.forEach(field => {
                if (field.key !== 'VEHICLE_ID') {
                    const input = document.getElementById(`field-${field.key}`);
                    if (input) {
                        input.value = '';
                    }
                }
            });

            // Сброс vehicle полей к исходным значениям с {VEHICLE_ID}
            vehicleFields.forEach(field => {
                const input = document.getElementById(`field-${field.key}`);
                if (input) {
                    const originalValue = field.value || '';
                    input.value = originalValue;
                    input.setAttribute('data-original-value', originalValue);
                }
            });

            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
        }
    </script>
</body>
</html>
