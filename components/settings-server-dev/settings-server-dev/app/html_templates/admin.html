<!DOCTYPE html>
<html>
<head>
    <title>Админ-панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa, #e4edf5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e6ed;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            color: #2c3e50;
            font-weight: 600;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn {
            padding: 16px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }

        .btn-add {
            background: linear-gradient(to right, #5d87a1, #7a9eb3);
            color: white;
        }

        .btn-read {
            background: linear-gradient(to right, #6a9d8f, #8ab4a5);
            color: white;
        }

        .btn-delete {
            background: linear-gradient(to right, #b86b6b, #d07a7a);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.12);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Админ-панель</h1>

        <div class="btn-container">
            <a href="/admin/create" class="btn btn-add">Создать переменные</a>
            <a href="/admin/read" class="btn btn-read">Прочитать переменные</a>
            <a href="/admin/delete" class="btn btn-delete">Удалить переменные</a>
        </div>
    </div>
</body>
</html>
