<!DOCTYPE html>
<html>
<head>
    <title>Чтение переменных</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa, #e4edf5);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e6ed;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 2rem;
            color: #2c3e50;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        input {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            border: 1px solid #d0d9e6;
            border-radius: 8px;
            background: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: #5d87a1;
            box-shadow: 0 0 0 2px rgba(93, 135, 161, 0.2);
        }

        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 14px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .btn-primary {
            flex: 1;
            background: linear-gradient(to right, #6a9d8f, #8ab4a5);
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #555;
            padding: 0 20px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #5d87a1;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .back-link:hover {
            text-decoration: underline;
            color: #2c3e50;
        }

        /* Новые стили для результатов */
        .result-container {
            margin-top: 30px;
            border-radius: 8px;
            background: #f8fafc;
            border: 1px solid #e0e6ed;
            display: none;
        }

        .result-header {
            padding: 15px 20px;
            background: #eef3f8;
            border-bottom: 1px solid #e0e6ed;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-title {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1.2rem;
        }

        .result-content {
            padding: 20px;
        }

        .variables-table {
            width: 100%;
            border-collapse: collapse;
        }

        .variables-table th {
            background: #eef3f8;
            padding: 12px 15px;
            text-align: left;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 2px solid #e0e6ed;
        }

        .variables-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e6ed;
        }

        .variables-table tr:last-child td {
            border-bottom: none;
        }

        .variables-table tr:hover {
            background: #f8fafc;
        }

        .search-container {
            margin-bottom: 15px;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #d0d9e6;
            border-radius: 6px;
            background: white;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(93, 135, 161, 0.3);
            border-radius: 50%;
            border-top-color: #5d87a1;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            padding: 15px;
            background: #fff5f5;
            border-radius: 8px;
            border: 1px solid #ffb3b3;
            color: #b86b6b;
            margin-top: 15px;
        }

        .count-badge {
            background: #5d87a1;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Чтение переменных</h1>

        <div class="form-group">
            <label for="vehicle-id">ID транспортного средства</label>
            <input type="number" id="vehicle-id" placeholder="Введите ID" min="1">
        </div>

        <div class="btn-container">
            <button class="btn btn-primary" onclick="fetchVariables()">Получить переменные</button>
            <button class="btn btn-secondary" onclick="resetForm()">Сбросить</button>
        </div>

        <div class="error-message" id="error-message"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Загрузка данных...</p>
        </div>

        <div class="result-container" id="result-container">
            <div class="result-header">
                <div class="result-title">Переменные для транспортного средства <span id="vehicle-id-display"></span></div>
                <div class="count-badge" id="variables-count">0 переменных</div>
            </div>

            <div class="result-content">
                <div class="search-container">
                    <input type="text" id="search-input" class="search-input" placeholder="Поиск по переменным...">
                </div>

                <table class="variables-table">
                    <thead>
                        <tr>
                            <th>Переменная</th>
                            <th>Значение</th>
                        </tr>
                    </thead>
                    <tbody id="variables-table-body">
                        <!-- Сюда будут добавляться переменные -->
                    </tbody>
                </table>
            </div>
        </div>

        <a href="/admin" class="back-link">← Вернуться в админ-панель</a>
    </div>

    <script>
        // Функция получения переменных
        function fetchVariables() {
            const vehicleId = document.getElementById('vehicle-id').value.trim();
            const errorMessage = document.getElementById('error-message');
            const loading = document.getElementById('loading');
            const resultContainer = document.getElementById('result-container');

            // Сброс предыдущих результатов
            errorMessage.style.display = 'none';
            resultContainer.style.display = 'none';

            // Валидация
            if (!vehicleId || isNaN(vehicleId) || vehicleId <= 0) {
                errorMessage.textContent = 'Пожалуйста, введите корректный числовой ID (больше 0)';
                errorMessage.style.display = 'block';
                return;
            }

            // Показываем индикатор загрузки
            loading.style.display = 'block';

            // Отправляем запрос
            fetch(`/api/secrets/${vehicleId}`)
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(err => {
                            throw new Error(err.detail || 'Неизвестная ошибка');
                        });
                    }
                    return response.json();
                })
                .then(data => {
                    displayVariables(vehicleId, data);
                })
                .catch(error => {
                    errorMessage.textContent = `Ошибка: ${error.message}`;
                    errorMessage.style.display = 'block';
                })
                .finally(() => {
                    loading.style.display = 'none';
                });
        }

        // Отображение переменных в таблице
        function displayVariables(vehicleId, data) {
            const resultContainer = document.getElementById('result-container');
            const vehicleIdDisplay = document.getElementById('vehicle-id-display');
            const variablesTableBody = document.getElementById('variables-table-body');
            const variablesCount = document.getElementById('variables-count');

            // Устанавливаем ID в заголовке
            vehicleIdDisplay.textContent = vehicleId;

            // Очищаем таблицу
            variablesTableBody.innerHTML = '';

            // Заполняем таблицу данными
            let rowCount = 0;
            for (const [key, value] of Object.entries(data)) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${key}</td>
                    <td>${value}</td>
                `;
                variablesTableBody.appendChild(row);
                rowCount++;
            }

            // Обновляем счетчик
            variablesCount.textContent = `${rowCount} переменных`;

            // Показываем результат
            resultContainer.style.display = 'block';

            // Инициализируем поиск
            setupSearch();
        }

        // Настройка поиска
        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            const tableBody = document.getElementById('variables-table-body');

            searchInput.addEventListener('input', function() {
                const filter = searchInput.value.toLowerCase();
                const rows = tableBody.getElementsByTagName('tr');

                for (let i = 0; i < rows.length; i++) {
                    const cells = rows[i].getElementsByTagName('td');
                    const key = cells[0].textContent.toLowerCase();
                    const value = cells[1].textContent.toLowerCase();

                    if (key.includes(filter) || value.includes(filter)) {
                        rows[i].style.display = '';
                    } else {
                        rows[i].style.display = 'none';
                    }
                }
            });
        }

        // Сброс формы
        function resetForm() {
            document.getElementById('vehicle-id').value = '';
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result-container').style.display = 'none';
        }
    </script>
</body>
</html>
