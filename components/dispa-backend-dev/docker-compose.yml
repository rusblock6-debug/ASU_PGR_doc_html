services:

  trip-service:
    build:
      context: .
      args:
        CI_COMMIT_REF_SLUG: dev
        CI_REGISTRY_USER: reader-01
        CI_REGISTRY_PASSWORD: ZX31hweNR
    env_file:
      - .env
    network_mode: host
    command: ["sh", "start.sh"]

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trip_service
    ports:
      - "5432:5432"
