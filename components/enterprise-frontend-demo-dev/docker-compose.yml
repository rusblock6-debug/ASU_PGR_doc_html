services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-frontend
    ports:
      - "3000:80"
    networks:
      - enterprise-network
    # depends_on:
    #   - backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  # Если ваш backend уже запущен отдельно, закомментируйте секцию ниже
  # и убедитесь, что он в той же сети Docker
  # backend:
  #   image: backend:latest  # Замените на имя вашего backend образа
  #   container_name: enterprise-backend
  #   ports:
  #     - "8001:8001"
  #   networks:
  #     - enterprise-network
  #   restart: unless-stopped
  #   # Раскомментируйте и настройте переменные окружения при необходимости
  #   # environment:
  #   #   - DATABASE_URL=postgresql://user:password@db:5432/dbname
  #   #   - SECRET_KEY=your-secret-key

networks:
  enterprise-network:
    driver: bridge

