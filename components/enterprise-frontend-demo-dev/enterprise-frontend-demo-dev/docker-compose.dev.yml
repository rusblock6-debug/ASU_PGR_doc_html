services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: enterprise-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - enterprise-network
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - DOCKER_ENV=true
    restart: unless-stopped

  # Если ваш backend уже запущен отдельно, закомментируйте секцию ниже
  # backend:
  #   image: backend:latest  # Замените на имя вашего backend образа
  #   container_name: enterprise-backend
  #   ports:
  #     - "8001:8001"
  #   networks:
  #     - enterprise-network
  #   restart: unless-stopped

networks:
  enterprise-network:
    driver: bridge

