# Вариант для запуска ТОЛЬКО frontend в Docker
# Backend должен быть запущен локально на http://0.0.0.0:8001

services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: enterprise-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

