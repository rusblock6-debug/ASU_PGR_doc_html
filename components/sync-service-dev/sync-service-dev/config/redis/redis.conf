# Redis configuration for maximum data persistence
# Sync Service - Reliable MQTT-based Data Synchronization

# ============================================================================
# PERSISTENCE
# ============================================================================

# RDB Snapshots - save database to disk periodically
# Format: save <seconds> <changes>
save ""

# Compress RDB files
rdbcompression yes

# Checksum RDB files for corruption detection
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Working directory for RDB and AOF files
dir /data

# ============================================================================
# APPEND ONLY FILE (AOF) - Maximum durability
# ============================================================================

# Enable AOF for maximum persistence
appendonly no

# AOF filename
appendfilename "appendonly.aof"

# Fsync policy for AOF - ALWAYS for maximum durability
# Options: always (safest, slowest), everysec (good balance), no (fastest, least safe)
# Using 'always' ensures every write is fsynced before acknowledging
appendfsync always

# Prevent fsync during rewrite (can cause latency spikes)
no-appendfsync-on-rewrite no

# Auto-rewrite AOF when it grows by this percentage
auto-aof-rewrite-percentage 100

# Minimum AOF size to trigger rewrite
auto-aof-rewrite-min-size 64mb

# Load truncated AOF on startup (recovery from crash)
aof-load-truncated yes

# Use RDB-AOF mixed format (faster loading, smaller files)
aof-use-rdb-preamble yes

# ============================================================================
# MEMORY MANAGEMENT
# ============================================================================

# Maximum memory (commented out - let Redis use available memory)
# maxmemory 256mb

# Eviction policy when maxmemory is reached
# allkeys-lru: Remove least recently used keys
# volatile-ttl: Remove keys with TTL set, shortest TTL first
# noeviction: Return errors when memory limit reached
maxmemory-policy volatile-ttl

# LRU/LFU algorithm precision (1-10, higher = more CPU, more accurate)
maxmemory-samples 5

# ============================================================================
# NETWORK
# ============================================================================

# Bind to all interfaces (Docker networking)
bind 0.0.0.0

# Port
port 6379

# TCP listen backlog
tcp-backlog 511

# Timeout for idle clients (0 = disabled)
timeout 0

# TCP keepalive
tcp-keepalive 300

# ============================================================================
# GENERAL
# ============================================================================

# Run as daemon (no for Docker)
daemonize no

# Logging
loglevel notice
logfile ""

# Number of databases
databases 16

# ============================================================================
# REPLICATION (for future multi-instance setup)
# ============================================================================

# Replica serves stale data when link with master is down
replica-serve-stale-data yes

# Replica is read-only
replica-read-only yes

# ============================================================================
# SECURITY
# ============================================================================

# Require password (commented out for local development)
# requirepass yourpassword

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG ""

# ============================================================================
# PERFORMANCE
# ============================================================================

# Disable transparent huge pages warning
always-show-logo no

# Active defragmentation
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 5
active-defrag-cycle-max 75

