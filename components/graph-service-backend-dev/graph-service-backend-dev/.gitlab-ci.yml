stages:
  - test
  - scanner
  - build
  - trigger-deploy

default:
  tags:
    - infra-cluster

include:
  - project: 'k8s/gitlab-template'
    file: 'pytest.gitlab-ci.yaml'
    inputs:
      pre_commit: true
      use_testcontainers: true
  - project: "k8s/gitlab-template"
    ref: "main"
    file: "/dispa-build.gitlab-ci.yaml"

trigger-server:
  stage: trigger-deploy
  extends: .trigger_dispatching_server
  variables:
    SERVICE_NAME: ${CI_PROJECT_NAME}

trigger-bort:
  stage: trigger-deploy
  extends: .trigger_dispatching_bort
  variables:
    SERVICE_NAME: ${CI_PROJECT_NAME}
