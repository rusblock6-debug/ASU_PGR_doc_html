[pytest]
asyncio_mode = auto
pythonpath = src
markers =
    integration: marks tests that hit external services (PostGIS testcontainer)

filterwarnings =
    ignore:The @wait_container_is_ready decorator is deprecated:DeprecationWarning:testcontainers\.

addopts =
    -vv
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=xml
