---
- name: Remove existing Docker Compose plugin binary if present
  ansible.builtin.file:
    path: "{{ docker_compose_plugin_path }}"
    state: absent

- name: Ensure Docker CLI is available
  ansible.builtin.command: docker --version
  register: docker_cli_version
  changed_when: false

# Далее идёт установка плагина (у вас уже есть эти шаги)
- name: Ensure Docker CLI plugin directory exists
  ansible.builtin.file:
    path: "{{ docker_compose_plugin_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Docker Compose plugin binary
  ansible.builtin.get_url:
    url: "{{ docker_compose_download_url }}"
    dest: "{{ docker_compose_plugin_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Verify docker compose plugin command
  ansible.builtin.command: docker compose version
  register: docker_compose_plugin_version
  changed_when: false

- name: Install docker-compose compatibility wrapper
  ansible.builtin.copy:
    dest: "{{ docker_compose_wrapper_path }}"
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/bin/sh
      exec docker compose "$@"

- name: Verify wrapper docker-compose command
  ansible.builtin.command: "{{ docker_compose_wrapper_path }} version"
  register: docker_compose_wrapper_version
  changed_when: false

- name: Add gitlab-runner user to docker group
  ansible.builtin.user:
    name: gitlab-runner
    groups: docker
    append: yes