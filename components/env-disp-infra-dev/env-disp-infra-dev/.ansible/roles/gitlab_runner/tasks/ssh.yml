---
- name: Ensure GitLab Runner SSH directory exists
  ansible.builtin.file:
    path: "{{ gitlab_runner_ssh_dir }}"
    state: directory
    owner: gitlab-runner
    group: gitlab-runner
    mode: "0700"

- name: Detect whether GitLab Runner SSH keys are provided explicitly
  ansible.builtin.set_fact:
    gitlab_runner_ssh_private_key_provided: "{{ gitlab_runner_ssh_private_key_content | default('', true) | trim | length > 0 }}"
    gitlab_runner_ssh_public_key_provided: "{{ gitlab_runner_ssh_public_key_content | default('', true) | trim | length > 0 }}"
  no_log: true

- name: Install provided GitLab Runner SSH private key
  ansible.builtin.copy:
    content: "{{ gitlab_runner_ssh_private_key_content | trim }}\n"
    dest: "{{ gitlab_runner_ssh_private_key_path }}"
    owner: gitlab-runner
    group: gitlab-runner
    mode: "{{ gitlab_runner_ssh_private_key_mode }}"
  when: gitlab_runner_ssh_private_key_provided
  no_log: true

- name: Install provided GitLab Runner SSH public key
  ansible.builtin.copy:
    content: "{{ gitlab_runner_ssh_public_key_content | trim }}\n"
    dest: "{{ gitlab_runner_ssh_public_key_path }}"
    owner: gitlab-runner
    group: gitlab-runner
    mode: "{{ gitlab_runner_ssh_public_key_mode }}"
  when: gitlab_runner_ssh_public_key_provided
  no_log: true

- name: Rebuild GitLab Runner public key from provided private key when public key is not set
  ansible.builtin.command:
    argv:
      - ssh-keygen
      - -y
      - -f
      - "{{ gitlab_runner_ssh_private_key_path }}"
  register: gitlab_runner_ssh_public_key_from_private
  become_user: gitlab-runner
  when:
    - gitlab_runner_ssh_private_key_provided
    - not gitlab_runner_ssh_public_key_provided
  changed_when: false
  no_log: true

- name: Write rebuilt GitLab Runner public key from provided private key
  ansible.builtin.copy:
    content: "{{ gitlab_runner_ssh_public_key_from_private.stdout | trim }}\n"
    dest: "{{ gitlab_runner_ssh_public_key_path }}"
    owner: gitlab-runner
    group: gitlab-runner
    mode: "{{ gitlab_runner_ssh_public_key_mode }}"
  when:
    - gitlab_runner_ssh_private_key_provided
    - not gitlab_runner_ssh_public_key_provided
  no_log: true

- name: Remove GitLab Runner SSH keypair when regeneration is requested
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ gitlab_runner_ssh_private_key_path }}"
    - "{{ gitlab_runner_ssh_public_key_path }}"
  when:
    - not gitlab_runner_ssh_private_key_provided
    - not gitlab_runner_ssh_public_key_provided
    - gitlab_runner_ssh_generate_keypair | bool
    - gitlab_runner_ssh_regenerate_keypair | bool

- name: Check GitLab Runner SSH private key state
  ansible.builtin.stat:
    path: "{{ gitlab_runner_ssh_private_key_path }}"
  register: gitlab_runner_ssh_private_key_stat

- name: Check GitLab Runner SSH public key state
  ansible.builtin.stat:
    path: "{{ gitlab_runner_ssh_public_key_path }}"
  register: gitlab_runner_ssh_public_key_stat

- name: Generate GitLab Runner SSH keypair
  ansible.builtin.command:
    argv:
      - ssh-keygen
      - -t
      - "{{ gitlab_runner_ssh_key_type }}"
      - -N
      - ""
      - -C
      - "{{ gitlab_runner_ssh_key_comment }}"
      - -f
      - "{{ gitlab_runner_ssh_private_key_path }}"
  become_user: gitlab-runner
  when:
    - not gitlab_runner_ssh_private_key_provided
    - not gitlab_runner_ssh_public_key_provided
    - gitlab_runner_ssh_generate_keypair | bool
    - not gitlab_runner_ssh_private_key_stat.stat.exists
  changed_when: true

- name: Rebuild missing GitLab Runner public key from private key
  ansible.builtin.command:
    argv:
      - ssh-keygen
      - -y
      - -f
      - "{{ gitlab_runner_ssh_private_key_path }}"
  register: gitlab_runner_ssh_public_key_from_private
  become_user: gitlab-runner
  when:
    - not gitlab_runner_ssh_private_key_provided
    - not gitlab_runner_ssh_public_key_provided
    - gitlab_runner_ssh_generate_keypair | bool
    - gitlab_runner_ssh_private_key_stat.stat.exists
    - not gitlab_runner_ssh_public_key_stat.stat.exists
  changed_when: true

- name: Write rebuilt GitLab Runner public key
  ansible.builtin.copy:
    content: "{{ gitlab_runner_ssh_public_key_from_private.stdout | trim }}\n"
    dest: "{{ gitlab_runner_ssh_public_key_path }}"
    owner: gitlab-runner
    group: gitlab-runner
    mode: "{{ gitlab_runner_ssh_public_key_mode }}"
  when:
    - not gitlab_runner_ssh_private_key_provided
    - not gitlab_runner_ssh_public_key_provided
    - gitlab_runner_ssh_generate_keypair | bool
    - gitlab_runner_ssh_private_key_stat.stat.exists
    - not gitlab_runner_ssh_public_key_stat.stat.exists

- name: Ensure GitLab Runner SSH private key permissions are correct
  ansible.builtin.file:
    path: "{{ gitlab_runner_ssh_private_key_path }}"
    state: file
    owner: gitlab-runner
    group: gitlab-runner
    mode: "{{ gitlab_runner_ssh_private_key_mode }}"
  when:
    - not gitlab_runner_ssh_private_key_provided
    - gitlab_runner_ssh_generate_keypair | bool

- name: Ensure GitLab Runner SSH public key permissions are correct
  ansible.builtin.file:
    path: "{{ gitlab_runner_ssh_public_key_path }}"
    state: file
    owner: gitlab-runner
    group: gitlab-runner
    mode: "{{ gitlab_runner_ssh_public_key_mode }}"
  when:
    - not gitlab_runner_ssh_public_key_provided
    - gitlab_runner_ssh_generate_keypair | bool

- name: Ensure GitLab Runner known_hosts file exists
  ansible.builtin.file:
    path: "{{ gitlab_runner_known_hosts_path }}"
    state: touch
    owner: gitlab-runner
    group: gitlab-runner
    mode: "0600"

- name: Ensure GitLab Runner known_hosts entries are present
  ansible.builtin.lineinfile:
    path: "{{ gitlab_runner_known_hosts_path }}"
    line: "{{ item }}"
    state: present
    create: true
    owner: gitlab-runner
    group: gitlab-runner
    mode: "0600"
  loop: "{{ gitlab_runner_known_hosts_entries }}"
  when: gitlab_runner_known_hosts_entries | length > 0
