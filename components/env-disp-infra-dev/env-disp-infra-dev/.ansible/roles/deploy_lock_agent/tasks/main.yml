---
- name: Resolve per-host deploy-lock-agent overrides
  ansible.builtin.set_fact:
    deploy_lock_agent_host_config: >-
      {{
        (
          deploy_lock_agent_hosts.get(inventory_hostname)
          if deploy_lock_agent_hosts.get(inventory_hostname) is not none
          else deploy_lock_agent_hosts.get(ansible_host | default(inventory_hostname), {})
        )
      }}
  when: deploy_lock_agent_enabled | bool

- name: Build effective deploy-lock-agent config
  ansible.builtin.set_fact:
    deploy_lock_agent_effective: >-
      {{
        deploy_lock_agent_defaults
        | combine(deploy_lock_agent_host_config | default({}), recursive=True)
        | combine(
            {
              'server_ip': (
                (
                  deploy_lock_agent_host_config.server_ip
                  if (
                    deploy_lock_agent_host_config is defined and
                    deploy_lock_agent_host_config.server_ip is defined and
                    deploy_lock_agent_host_config.server_ip
                  )
                  else (
                    deploy_lock_agent_defaults.server_ip
                    if deploy_lock_agent_defaults.server_ip
                    else (
                      ansible_default_ipv4.address
                      if ansible_default_ipv4 is defined and ansible_default_ipv4.address is defined
                      else ansible_host | default(inventory_hostname)
                    )
                  )
                )
              )
            },
            recursive=True
          )
      }}
  when: deploy_lock_agent_enabled | bool
  no_log: true

- name: Ensure deploy-lock-agent config is complete
  ansible.builtin.assert:
    that:
      - deploy_lock_agent_effective.deploy_lock_url | length > 0
      - deploy_lock_agent_effective.deploy_lock_token | length > 0
      - deploy_lock_agent_effective.deploy_lock_env_key | length > 0
      - deploy_lock_agent_effective.server_ip | length > 0
    fail_msg: >-
      deploy_lock_agent settings are incomplete for {{ inventory_hostname }}.
  when: deploy_lock_agent_enabled | bool
  no_log: true

- name: Ensure deploy-lock-agent directory exists
  ansible.builtin.file:
    path: "{{ deploy_lock_agent_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: deploy_lock_agent_enabled | bool

- name: Render deploy-lock-agent docker-compose file
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ deploy_lock_agent_compose_path }}"
    owner: root
    group: root
    mode: "0644"
  when: deploy_lock_agent_enabled | bool
  no_log: true

- name: Start deploy-lock-agent with docker compose
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ deploy_lock_agent_dir }}"
  when:
    - deploy_lock_agent_enabled | bool
    - deploy_lock_agent_compose_up | bool
  register: deploy_lock_agent_compose_up_result
  changed_when: >-
    'Creating' in deploy_lock_agent_compose_up_result.stdout or
    'Starting' in deploy_lock_agent_compose_up_result.stdout or
    'Recreating' in deploy_lock_agent_compose_up_result.stdout

