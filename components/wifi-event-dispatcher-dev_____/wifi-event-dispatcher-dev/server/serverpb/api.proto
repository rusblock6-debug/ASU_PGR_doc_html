syntax = "proto3";

package serverpb;

option go_package = "wifi-event-dispatcher/server/serverpb;serverpb";

service EventDispatchService {
  rpc StreamBortSendEvents(stream SendEventRequest) returns (stream SendEventResponse);
  rpc StreamBortGetEvents(stream GetEventRequest) returns (stream GetEventResponse);
}

message Event {
  string message_id = 2;
  string topic = 3;
  bytes payload = 4;
}

message Ack {
  string message_id = 1;
  bool ok = 2;
  string error = 3;
}


message SendEventRequest {
  oneof kind {
    Client producer = 1;
    Event event = 2;
  }
}

message SendEventResponse {
  Ack ack = 1;
}

message Client {
  int32 truck_id = 1;
}

message GetEventRequest {
  oneof kind {
    Client subscriber = 1;
    Ack ack = 2;
  }
}

message GetEventResponse {
  Event event = 1;
}
