default:
  tags:
    - infra-cluster

stages:
  - lock_check
  - deploy
  - notify

variables:
  DEV_DEPLOY_ENVS: "dispa-bort dispa-bort2 dispa-bort3 dispa-bort4"
  STAGE_DEPLOY_ENVS: "dispa-stage-bort-1 dispa-stage-bort-2 dispa-stage-bort-3 dispa-stage-bort-4 dispa-stage-bort-5 dispa-stage-bort-6 dispa-stage-bort-7 dispa-stage-bort-8"
  TELEGRAM_BOT_TOKEN: "8497465232:AAHPtZ73og27ult9gv681QWSgLMY7FlAyfM"
  TELEGRAM_CHAT_ID: "-1003429356878"

generate_deploy:
  stage: lock_check
  image: ${CI_REGISTRY_BASE}/base-images:curl-9a025b9a
  script:
    - |
      set -euo pipefail

      SOURCE_BRANCH="${TRIGGERED_BRANCH:-${CI_COMMIT_BRANCH:-}}"

      if [ "${SOURCE_BRANCH}" = "staging" ]; then
        DEPLOY_ENVS="${STAGE_DEPLOY_ENVS}"
      else
        DEPLOY_ENVS="${DEV_DEPLOY_ENVS}"
      fi

      echo "stages:" > generated.yml
      echo "  - deploy" >> generated.yml

      for ENV in ${DEPLOY_ENVS}; do
        echo "===> Проверяю $ENV"
        RESP=$(curl -sk --max-time 5 "https://deploy-lock.dmi-msk.ru/api/envs/${ENV}/status" || true)
        STATUS=$(echo "$RESP" | jq -r '.status' 2>/dev/null || echo "")
        MSG=$(echo "$RESP" | jq -r '.message' 2>/dev/null || true)
        [ -n "$MSG" ] && echo "$MSG"

        if [ "$STATUS" = "1" ]; then
          echo "  -> разрешён"
          {
            echo "${ENV}:"
            echo "  stage: deploy"
            echo "  extends: .deploy_template_${ENV}"
          } >> generated.yml
        else
          echo "  -> заблокирован"
        fi
      done

      echo "----- generated.yml -----"
      cat generated.yml
  artifacts:
    when: always
    paths:
      - generated.yml
    expire_in: 1h
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "staging")'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'

run_deploys:
  stage: deploy
  needs: ["generate_deploy"]
  trigger:
    include:
      - artifact: generated.yml
        job: generate_deploy
      - local: .gitlab-ci-deploy-templates.yml
    strategy: depend
    forward:
      pipeline_variables: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "staging")'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'

