version: '3'

vars:
  ENV_FILE: '{{default ".env_server_dev" .ENV_FILE}}'
  BRANCH: '{{default "dev" .BRANCH}}'
  LATEST_TAG: '{{default (printf "%s-latest" .BRANCH) .LATEST_TAG}}'
  COMPOSE_SERVER: docker-compose.server.yaml
  COMPOSE_OVERRIDE: 'docker-compose.server.override.yaml'
  IS_LOCAL: '{{.IS_LOCAL | default "true"}}'
  DOCKER_COMPOSE:
    sh: |
      if command -v docker-compose >/dev/null 2>&1; then
        echo docker-compose
      else
        echo "docker compose"
      fi
  DC: >-
      {{.DOCKER_COMPOSE}}
      -f {{.COMPOSE_SERVER}}
      {{if eq .IS_LOCAL "true"}}-f {{.COMPOSE_OVERRIDE}}{{end}}
      --env-file {{.ENV_FILE}}

tasks:
  default:
    desc: Показать список задач
    cmds:
      - task --list

  help:
    desc: Показать список задач
    cmds:
      - task --list

  init-server:
    desc: Клонирование репозиториев серверной части
    aliases:
      - init
    cmds:
      - echo "Инициализация серверной части..."
      - bash scripts/clone_server.sh
      - echo "Серверная часть инициализирована"

  build-server:
    desc: Собрать server-образы
    cmds:
      - '{{.DC}} build'

  config:
    desc: Отображение получившегося конфига docker-compose
    cmds:
      - '{{.DC}} config'    

  dc:
    desc: "Выполнить любую Docker Compose команду"
    cmds:
      - '{{.DC}} {{.CLI_ARGS}}'

  easy-server:
    desc: "Запустить только основные сервисы (исключая тяжелые/опциональные)"
    cmds:
      - '{{.DC}} up -d {{.SERVICES}}'
    vars:
      SERVICES: 'postgres redis nanomq-server rabbitmq-server vault settings-server enterprise-service'
    aliases:
      - easy

  build-server-clean:
    desc: Собрать server-образы без кеша
    cmds:
      - '{{.DC}} build --no-cache'

  dev-server:
    desc: Запустить server-стек в режиме разработки
    deps:
      - init-server
    cmds:
      - |
        set -e
        echo "Используется env файл: {{.ENV_FILE}}"
        echo "Пересборка образов серверной части..."
        {{.DC}} build --no-cache
        echo "Запуск серверной части..."
        ENVIRONMENT=development {{.DC}} up -d --force-recreate --remove-orphans
        
        echo "Серверная часть запущена"
        echo "Ожидание завершения настройки MinIO..."
        sleep 5
        if docker ps -a --filter "name=minio-setup" --filter "status=exited" | grep -q "minio-setup"; then
          echo "Удаление init-контейнера minio-setup..."
          docker rm minio-setup >/dev/null 2>&1 || true
        fi
      - task vector
      - task urls-server ENV_FILE={{.ENV_FILE}}

  down:
    desc: Остановить server-стек
    aliases:
      - stop
    cmds:
      - '{{.DC}} down'
      - task vector-down
      - echo "Серверная часть остановлена"

  restart:
    desc: Перезапустить server-стек
    aliases:
      - restart-server
    cmds:
      - '{{.DC}} restart'
      - task vector
      - echo "Серверная часть перезапущена"

  logs-server:
    desc: Показать логи server-стека
    aliases:
      - logs
    cmds:
      - '{{.DC}} logs -f'

  ps:
    desc: Показать статус server-стека
    aliases:
      - ps-server
    cmds:
      - '{{.DC}} ps'

  urls-server:
    desc: Показать URLs server-стека
    aliases:
      - urls
    cmds:
      - |
        set -e
        echo ""
        echo "=== URLs серверных сервисов ==="
        echo ""
        echo "PostgreSQL:            localhost:5433"
        echo "Redis:                 localhost:6380"
        echo "NanoMQ MQTT:           localhost:1884"
        echo "NanoMQ WebSocket:      ws://localhost:8084/mqtt"
        echo "NanoMQ Admin:          http://localhost:8082"
        ENTERPRISE_PORT=$(grep -E '^ENTERPRISE_SERVICE_PORT=' "{{.ENV_FILE}}" 2>/dev/null | tail -n 1 | cut -d= -f2)
        ENTERPRISE_PORT=${ENTERPRISE_PORT:-8002}
        echo "Enterprise Service:    http://localhost:${ENTERPRISE_PORT}"
        echo "Client:                http://localhost:5173"
        echo "API Gateway:           http://localhost:8015"
        echo "Dozzle:                http://localhost:9998"
        echo "Vector API:            http://localhost:9099"
        echo ""

  vector:
    desc: Запустить Vector для сбора Docker логов
    cmds:
      - bash ./monitoring/start.sh

  vector-down:
    desc: Остановить Vector
    cmds:
      - |
        set -e
        if command -v docker-compose >/dev/null 2>&1; then
          DOCKER_COMPOSE_CMD="docker-compose"
        else
          DOCKER_COMPOSE_CMD="docker compose"
        fi
        cd monitoring && $DOCKER_COMPOSE_CMD down || true

  health:
    desc: Показать health server-стека
    cmds:
      - '{{.DC}} ps --format json | jq -r -s ''.[] | "\(.Name): \(.Health)"'''

  backup-volumes:
    desc: Сохранить postgres volume server-стека
    cmds:
      - |
        set -e
        echo "Создание резервной копии volumes..."
        mkdir -p backups
        TS=$(date +%Y%m%d-%H%M%S)
        docker run --rm \
          -v dispatching-server_postgres-server-data:/data \
          -v "$PWD/backups:/backup" \
          alpine tar czf "/backup/postgres-server-data-${TS}.tar.gz" -C /data .
        echo "Резервная копия создана"

  redis-cli:
    desc: Открыть redis-cli внутри server-стека
    cmds:
      - '{{.DC}} exec redis redis-cli'

  psql:
    desc: Открыть psql внутри server-стека
    cmds:
      - '{{.DC}} exec postgres psql -U postgres -d postgres'

  clickhouse-client:
    desc: Открыть clickhouse-client
    cmds:
      - '{{.DC}} exec clickhouse clickhouse-client'

  pull:
    desc: Скачать образы server-стека
    aliases:
      - pull-server
    cmds:
      - '{{.DC}} pull'

  stats:
    desc: Показать docker stats
    cmds:
      - docker stats --no-stream

  prune:
    desc: Удалить неиспользуемые Docker ресурсы
    cmds:
      - docker system prune -f
      - echo "Неиспользуемые ресурсы удалены"

  prune-builder:
    desc: Очистить build cache
    cmds:
      - docker builder prune -f
      - echo "Build cache очищен"

  cleanup-image-repo:
    desc: Удалить старые теги одного образа, сохранив текущий и branch-latest
    requires:
      vars:
        - REPO
        - CURRENT_TAG
    cmds:
      - |
        set -e
        DRY_RUN_ARG=""
        if [ "{{default "0" .DRY_RUN}}" = "1" ]; then
          DRY_RUN_ARG="--dry-run"
        fi
        bash scripts/cleanup-image-tags.sh \
          --repo "{{.REPO}}" \
          --keep-tag "{{.CURRENT_TAG}}" \
          --keep-tag "{{.LATEST_TAG}}" \
          ${DRY_RUN_ARG}

  cleanup-server-images:
    desc: Удалить старые теги управляемых server-образов, сохранив текущие и branch-latest
    cmds:
      - |
        set -e
        DRY_RUN_ARG=""
        REFS_FILE="$(mktemp)"
        trap 'rm -f "$REFS_FILE"' EXIT
        if [ "{{default "0" .DRY_RUN}}" = "1" ]; then
          DRY_RUN_ARG="--dry-run"
        fi
        if [ ! -f "{{.ENV_FILE}}" ]; then
          echo "Ошибка: Файл {{.ENV_FILE}} не найден!"
          exit 1
        fi
        echo "Используется env файл: {{.ENV_FILE}}"
        bash scripts/ensure-image-tag-defaults.sh "{{.ENV_FILE}}" "{{.LATEST_TAG}}" "{{.COMPOSE_SERVER}}"
        bash scripts/list-managed-image-refs.sh "{{.ENV_FILE}}" "{{.COMPOSE_SERVER}}" > "$REFS_FILE"
        while IFS=$'\t' read -r IMAGE_REPO IMAGE_TAG IMAGE_VAR TAG_VAR; do
          [ -n "$IMAGE_REPO" ] || continue
          echo "===> ${IMAGE_VAR}/${TAG_VAR}: ${IMAGE_REPO}:${IMAGE_TAG}"
          bash scripts/cleanup-image-tags.sh \
            --repo "$IMAGE_REPO" \
            --keep-tag "$IMAGE_TAG" \
            --keep-tag "{{.LATEST_TAG}}" \
            ${DRY_RUN_ARG}
        done < "$REFS_FILE"
        echo "Cleanup управляемых server-образов завершён"

  check-migrations:
    desc: Проверить целостность миграций во всех сервисах
    cmds:
      - echo "Проверка целостности миграций..."
      - python3 scripts/check_migrations.py
      - echo "Проверка завершена"

  update-server-service:
    desc: Пересобрать и перезапустить один server-сервис
    requires:
      vars:
        - SERVICE
    cmds:
      - |
        set -e
        echo "Используется env файл: {{.ENV_FILE}}"
        if ! {{.DC}} config --services 2>/dev/null | grep -q "^{{.SERVICE}}$"; then
          echo "Сервис {{.SERVICE}} не найден в {{.COMPOSE_SERVER}} - пропускаем"
          exit 0
        fi
        echo "Пересборка сервиса {{.SERVICE}}..."
        {{.DC}} build --no-cache {{.SERVICE}}
        echo "Перезапуск сервиса {{.SERVICE}}..."
        {{.DC}} up -d --no-deps --force-recreate {{.SERVICE}}
        echo "Сервис {{.SERVICE}} обновлён"

  pull-and-restart-server-service:
    desc: Pull и перезапуск одного server-сервиса
    requires:
      vars:
        - SERVICE
    cmds:
      - |
        set -e
        echo "Используется env файл: {{.ENV_FILE}}"
        if ! {{.DC}} config --services 2>/dev/null | grep -q "^{{.SERVICE}}$"; then
          echo "Сервис {{.SERVICE}} не найден в {{.COMPOSE_SERVER}} - пропускаем"
          exit 0
        fi
        echo "Docker login в registry..."
        docker login registry.dmi-msk.ru -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
        echo "Pulling образа для {{.SERVICE}}..."
        {{.DC}} pull {{.SERVICE}}
        echo "Перезапуск сервиса {{.SERVICE}}..."
        {{.DC}} up -d --no-deps --force-recreate {{.SERVICE}}
        echo "Сервис {{.SERVICE}} обновлён (pull)"

  pull-all-server:
    desc: Pull всех образов server-стека
    cmds:
      - |
        set -e
        echo "Pulling всех образов (server)..."
        {{.DC}} pull
        echo "Все образы загружены"

  uv-index-url:
    desc: Настроить extra-index-url для uv
    cmds:
      - |
        set -e
        set -a; source .env; set +a
        echo "Установка глобального extra-index-url для uv (ветка: {{.BRANCH}})"
        mkdir -p ~/.config/uv
        cat > ~/.config/uv/uv.toml <<EOF
        extra-index-url = ["https://${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD}@${CI_PIPY_DOMAIN}/repository/pypi-{{.BRANCH}}-group/simple"]
        EOF

  uv-index-remove:
    desc: Удалить конфигурацию uv
    cmds:
      - |
        set -e
        echo "Удаление файла конфигурации uv"
        rm -f ~/.config/uv/uv.toml

  help-uv:
    desc: Показать справку по uv-конфигурации
    cmds:
      - echo "Цели для управления конфигурацией uv (Nexus):"
      - echo "  task uv-index-url BRANCH=dev      Создать конфигурацию uv для Nexus-репозитория pypi-<BRANCH>-group."
      - echo "  task uv-index-remove              Удалить файл конфигурации uv (~/.config/uv/uv.toml)."
