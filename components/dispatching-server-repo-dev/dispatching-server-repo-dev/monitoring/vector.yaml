data_dir: /vector-data-dir

# API для метрик и управления
api:
  enabled: true
  address: 0.0.0.0:8686
  playground: false

# Источники логов
sources:
  # Сбор логов из Docker контейнеров напрямую через Docker API
  docker_logs:
    type: docker_logs

  # Внутренние метрики Vector
  internal_metrics:
    type: internal_metrics
    scrape_interval_secs: 15

# Трансформации логов
transforms:
  # Обработка Docker логов
  docker_parser:
    type: remap
    inputs:
      - docker_logs
    source: |
      # Получаем реальное имя хоста машины из переменной окружения
      # В VRL используем to_string для ENV переменных
      real_hostname = to_string(get_env_var("HOST_HOSTNAME") ?? "unknown")
      .host = real_hostname
      
      # Устанавливаем namespace
      # Приоритет: переменная окружения NAMESPACE -> hostname mapping -> имя хоста
      namespace_env = to_string(get_env_var("NAMESPACE") ?? "")
      if namespace_env != "" {
        .namespace = namespace_env
      } else {
        # Mapping hostname -> namespace
        hostname = .host
        if hostname == "nir-track-05" {
          .namespace = "dispa-server"
        } else {
          .namespace = hostname
        }
      }
      
      # Сохраняем оригинальное сообщение как log
      .log = .message
      del(.message)
      
      # Устанавливаем source_type
      .source_type = "docker"
      
      # Убеждаемся что timestamp есть
      if !exists(.timestamp) {
        .timestamp = now()
      }

  # Парсинг внутренних метрик Vector
  metrics_parser:
    type: remap
    inputs:
      - internal_metrics
    source: |
      .host, err = get_hostname()
      if err != null {
        .host = "unknown"
      }
      .source_type = "vector_internal"

# Выходные точки (sinks)
sinks:
  # Отправка метрик Vector в Prometheus формат
  prometheus_exporter:
    type: prometheus_exporter
    inputs:
      - metrics_parser
    address: 0.0.0.0:9090
    default_namespace: vector

  # Отправка логов в Victoria Logs через Elasticsearch API
  victoria_logs:
    type: elasticsearch
    inputs:
      - docker_parser
    mode: bulk
    api_version: v8
    compression: gzip
    # Endpoint Victoria Logs
    endpoints:
      - http://10.100.109.25:9428/insert/elasticsearch
    healthcheck:
      enabled: false
    request:
      headers:
        # Заголовки для Victoria Logs
        VL-Time-Field: timestamp
        VL-Stream-Fields: namespace,container_name,container_id,image,stream,host
        VL-Msg-Field: log
        AccountID: "0"
        ProjectID: "0"
    # Буферизация для надежности
    buffer:
      type: disk
      max_size: 268435488
      when_full: block
    # Повторные попытки при ошибках
    request_retry_partial: true
