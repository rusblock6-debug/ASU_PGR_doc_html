
name: dispatching-server

x-trip-service-template: &trip-service-template
  image: ${DISPA_BACKEND_IMAGE:-registry.dmi-msk.ru/dispa-backend}:${DISPA_BACKEND_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
  environment:
    SERVICE_MODE: server
    VEHICLE_ID: "+"  # Wildcard - слушать все vehicle_id
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: ${TRIP_POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    REDIS_HOST: redis
    REDIS_PORT: 6379
    NANOMQ_HOST: nanomq-server
    NANOMQ_PORT: 1883
    ENTERPRISE_SERVICE_HOST: enterprise-service
    ENTERPRISE_SERVICE_PORT: 8001
    DEBUG: ${DEBUG}
    LOG_LEVEL: ${LOG_LEVEL}
    TIMEZONE: ${TIMEZONE}

    # Transport library env
    RABBIT__HOST: rabbitmq-server
    RABBIT__PORT: 5672
    RABBIT__USER: ${RABBIT_TRANSPORT_USER}
    RABBIT__PASSWORD: ${RABBIT_TRANSPORT_PASSWORD}
    RABBIT__RETRY_MAX_ATTEMPTS: ${RETRY_MAX_ATTEMPTS}
    RABBIT__RETRY_BASE_DELAY_SEC: ${RETRY_BASE_DELAY_SEC}
    TRIP_SERVICE_SERVER_PORT: ${TRIP_SERVICE_SERVER_PORT}
    AUTO_APPROVE_DISPATCHER_ASSIGNMENT_DELAY_SECONDS: ${AUTO_APPROVE_DISPATCHER_ASSIGNMENT_DELAY_SECONDS}

services:


  client-disp:
    image: ${CLIENT_DISP_IMAGE:-registry.dmi-msk.ru/client-disp}:${CLIENT_DISP_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-server-client
    environment:
      - APP_MODE=${APP_MODE}
    ports:
      - "5173:5173"
      - "80:80"
    expose:
      - "80" 
    depends_on:
      enterprise-service:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - dispatching-server-network

  enterprise-frontend-demo:
    image: ${ENTERPRISE_FRONTEND_DEMO_IMAGE:-registry.dmi-msk.ru/enterprise-frontend-demo}:${ENTERPRISE_FRONTEND_DEMO_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-server-enterprise-frontend-demo
    environment:
      NODE_ENV: ${ENTERPRISE_FRONTEND_DEMO_NODE_ENV}
    ports:
      - "${ENTERPRISE_FRONTEND_DEMO_PORT}:${ENTERPRISE_FRONTEND_DEMO_CONTAINER_PORT}"
    depends_on:
      enterprise-service:
        condition: service_started
      graph-service-backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - dispatching-server-network


  # PostgreSQL - основная база данных для микросервисов
  postgres:
    image: registry.dmi-msk.ru/base-images:pgrouting-16-3.5-3.6.3-master
    container_name: dispatching-server-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./config/postgres/initdb_server:/docker-entrypoint-initdb.d
      - postgres-server-data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dispatching-server-network

  # Redis - кэширование и pub/sub
  redis:
    image: registry.dmi-msk.ru/base-images:redis-7-master
    container_name: dispatching-server-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-server-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dispatching-server-network

  # Vault
  vault:
    image: ${VAULT_DISP_IMAGE:-registry.dmi-msk.ru/vault-disp}:${VAULT_DISP_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-server-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      - VAULT_ADDR=http://0.0.0.0:8200
      - VAULT_API_ADDR=http://0.0.0.0:8200
    volumes:
       - vault_data:/vault/file
       - vault_state:/vault/data
    cap_add:
      - IPC_LOCK
    networks:
      - dispatching-server-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8200/v1/sys/health" ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  #settings-server 
  settings-server:
    image: ${SETTINGS_SERVER_IMAGE:-registry.dmi-msk.ru/settings-server}:${SETTINGS_SERVER_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-settings-service
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      VAULT_URL: ${VAULT_URL}
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - vault_state:/vault_state:ro
    networks:
      - dispatching-server-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8006/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # NanoMQ - MQTT брокер с MQTT Bridge к бортовой ВМ
  nanomq-server:
    image: registry.dmi-msk.ru/base-images:nanomq-0.24.11-master
    container_name: dispatching-server-nanomq
    restart: unless-stopped
    ports:
      - "${NANOMQ_MQTT_PORT}:1883"
      - "${NANOMQ_WS_PORT}:8083"
      - "${NANOMQ_ADMIN_PORT}:8081"
    volumes:
      - nanomq-data:/opt/nanomq/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://admin:public@127.0.0.1:8081/api/v4"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dispatching-server-network

  rabbitmq-server:
    image: ${RABBITMQ_DISP_IMAGE:-registry.dmi-msk.ru/rabbitmq-disp}:${RABBITMQ_DISP_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-server-rabbitmq
    hostname: rabbitmq-server-node
    ports:
      - "${RABBITMQ_PORT}:5672"  # AMQP
      - "${RABBITMQ_HTTP_PORT}:15672"  # HTTP management UI
      - "${RABBITMQ_STREAM_PORT}:5552"  # Stream protocol
    volumes:
      - rabbitmq-server-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dispatching-server-network

  # Enterprise Service - основной микросервис
  enterprise-service:
    image: ${ENTERPRISE_SERVICE_IMAGE:-registry.dmi-msk.ru/enterprise-service}:${ENTERPRISE_SERVICE_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-server-enterprise-service
    restart: unless-stopped
    environment:
      DEBUG: ${DEBUG}
      HOST: "0.0.0.0"
      PORT: "8001"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/enterprise_db"
      REDIS_URL: "redis://redis:6379/0"
      TIMEZONE: ${TIMEZONE}
      LOG_LEVEL: ${LOG_LEVEL}
      NANOMQ_HOST: nanomq-server
      NANOMQ_MQTT_PORT: 1883
    ports:
      - "${ENTERPRISE_SERVICE_PORT}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Telemetry Service - сбор и хранение телеметрии в Redis Streams
  telemetry-service:
    image: ${TELEMETRY_SERVICE_IMAGE:-registry.dmi-msk.ru/telemetry-service}:${TELEMETRY_SERVICE_IMAGE_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-server-telemetry-service
    restart: unless-stopped
    environment:
      DEBUG: ${DEBUG}
      HOST: "0.0.0.0"
      PORT: 8002
      REDIS_URL: "redis://redis:6379/0"
      NANOMQ_HOST: nanomq-server
      NANOMQ_MQTT_PORT: 1883
      NANOMQ_WS_PORT: 8083
      TELEMETRY_STREAM_TTL_SECONDS: ${TELEMETRY_STREAM_TTL_SECONDS}
      TIMEZONE: ${TIMEZONE}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${TELEMETRY_SERVICE_PORT}:8002"
    depends_on:
      redis:
        condition: service_healthy
      nanomq-server:
        condition: service_healthy
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8004/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Graph Service Backend API - обработка графа маршрутов
  graph-service-backend:
    image: ${GRAPH_SERVICE_BACKEND_IMAGE:-registry.dmi-msk.ru/graph-service-backend}:${GRAPH_SERVICE_BACKEND_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-server-graph-backend
    restart: unless-stopped
    environment:
      # Режим работы: "+" = сервер
      VEHICLE_ID: "+"
      # Список бортов для рассылки событий (через запятую)
      VEHICLE_IDS: 4
      # База данных
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${GRAPH_POSTGRES_DB}
      # mqtt
      NANOMQ_HOST: nanomq-server
      NANOMQ_MQTT_PORT: 1883
      # GPS → Canvas трансформация
      ORIGIN_GPS_LAT: ${ORIGIN_GPS_LAT}
      ORIGIN_GPS_LON: ${ORIGIN_GPS_LON}
      ORIGIN_CANVAS_X: ${ORIGIN_CANVAS_X}
      ORIGIN_CANVAS_Y: ${ORIGIN_CANVAS_Y}
      ORIGIN_CANVAS_Z: ${ORIGIN_CANVAS_Z}
      DEFAULT_VEHICLE_HEIGHT: ${DEFAULT_VEHICLE_HEIGHT}
      # S3
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_ENDPOINT_URL: ${MINIO_ENDPOINT_URL_SERVER}
      S3_BUCKET_NAME: graph-service
      S3_REGION_NAME: ${MINIO_REGION_NAME}
      # Debug
      DEBUG: ${DEBUG}
      LOG_LEVEL: ${LOG_LEVEL}
      # Route calculation
      DEVIATION_THRESHOLD_M: ${DEVIATION_THRESHOLD_M}
      ROUTE_CACHE_TTL: ${ROUTE_CACHE_TTL}
      ENTERPRISE_SERVICE_INTERNAL_PORT: ${ENTERPRISE_SERVICE_INTERNAL_PORT}
    ports:
      - "${GRAPH_BACKEND_SERVICE_PORT}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      nanomq-server:
        condition: service_healthy
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Graph Service Frontend
  graph-service-frontend:
    build:
      context: ../repos/graph-service-frontend
      dockerfile: Dockerfile
      args:
        # Передаем переменные окружения как build args для сборки React приложения
        REACT_APP_ENTERPRISE_SERVICE_HOST: ${REACT_APP_ENTERPRISE_SERVICE_HOST}
        REACT_APP_ENTERPRISE_SERVICE_PORT: ${REACT_APP_ENTERPRISE_SERVICE_PORT}
        REACT_APP_GARAGE_LAT: ${REACT_APP_GARAGE_LAT}
        REACT_APP_GARAGE_LON: ${REACT_APP_GARAGE_LON}
        REACT_APP_GARAGE_HEIGHT: ${REACT_APP_GARAGE_HEIGHT}
        REACT_APP_MODE: ${REACT_APP_MODE}
    container_name: dispatching-server-graph-frontend
    restart: unless-stopped
    ports:
      - "${GRAPH_FRONTEND_SERVICE_PORT}:80"
    environment:
      BACKEND_HOST: graph-service-backend
      BACKEND_PORT: 5000
    depends_on:
      - graph-service-backend
      - enterprise-service
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ClickHouse
  clickhouse:
    image: registry.dmi-msk.ru/base-images:clickhouse-server-master
    container_name: dispatching-clickhouse
    restart: unless-stopped
    ports:
      - "${CLICKHOUSE_HTTP_PORT}:${CLICKHOUSE_HTTP_PORT}"
      - "${CLICKHOUSE_NATIVE_PORT}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
    networks:
      - dispatching-server-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:${CLICKHOUSE_HTTP_PORT}/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # audit exporter migrations
  audit-exporter-migrations:
    image: ${AUDIT_EXPORTER_IMAGE:-registry.dmi-msk.ru/audit-exporter}:${AUDIT_EXPORTER_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-audit-exporter-migrations
    entrypoint: ["./scripts/migrate.sh"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_NATIVE_PORT: 9000
      CLICKHOUSE_DATABASE: audit
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_SECURE: "false"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - dispatching-server-network


  # audit exporter migrations
  audit-exporter:
    image: ${AUDIT_EXPORTER_IMAGE:-registry.dmi-msk.ru/audit-exporter}:${AUDIT_EXPORTER_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-audit-exporter
    environment:
      GRAPH__POSTGRES_HOST: postgres
      GRAPH__POSTGRES_PORT: 5432
      GRAPH__POSTGRES_DATABASE: trip_service
      GRAPH__POSTGRES_USER: ${POSTGRES_USER}
      GRAPH__POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ENTERPRISE__POSTGRES_HOST: postgres
      ENTERPRISE__POSTGRES_PORT: 5432
      ENTERPRISE__POSTGRES_DATABASE: enterprise_db
      ENTERPRISE__POSTGRES_USER: ${POSTGRES_USER}
      ENTERPRISE__POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TRIP__POSTGRES_HOST: postgres
      TRIP__POSTGRES_PORT: 5432
      TRIP__POSTGRES_DATABASE: dispatching_graph
      TRIP__POSTGRES_USER: ${POSTGRES_USER}
      TRIP__POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: ${CLICKHOUSE_HTTP_PORT}
      CLICKHOUSE_DATABASE: audit
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_SECURE: "false"
      DEPENDENCY_CONNECT_TIMEOUT_SECONDS: 5
    depends_on:
      audit-exporter-migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - dispatching-server-network

    ports:
      - "${AUDIT_EXPORTER_PORT}:8000"

  # Trip Service Server - HTTP API + основной процесс (gunicorn из start.sh) 
  # Серверный режим для управления всеми машинами
  trip-service-server:
    <<: *trip-service-template
    container_name: dispatching-server-trip-service
    ports:
      - "${TRIP_SERVICE_SERVER_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nanomq-server:
        condition: service_healthy
      enterprise-service:
        condition: service_healthy
      rabbitmq-server:
        condition: service_healthy
    command: ["sh", "start.sh"]
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Trip Transport Library Server - только FastStream/RabbitMQ consumer (без HTTP)
  trip-transport-service-server:
    <<: *trip-service-template
    container_name: dispatching-transport-service-server
    depends_on:
      rabbitmq-server:
        condition: service_healthy
    command: ["sh", "start.broker.sh", "server"]
    restart: unless-stopped
    networks:
      - dispatching-server-network

  # Sync Service Server - синхронизация сообщений между сервисами
  sync-service:
    image: ${SYNC_SERVICE_IMAGE:-registry.dmi-msk.ru/sync-service}:${SYNC_SERVICE_IMAGE_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    # container_name: dispatching-server-sync-service
    restart: unless-stopped
    environment:
      INSTANCE_ID: ${SYNC_SERVICE_SERVER_INSTANCE_ID}
      MODE: ${SYNC_SERVICE_SERVER_MODE}
      LOG_LEVEL: ${SYNC_SERVICE_SERVER_LOG_LEVEL}
      DEBUG_MODE: ${SYNC_SERVICE_SERVER_DEBUG_MODE}
      MULTI_REPLICA_MODE: ${SYNC_SERVICE_SERVER_MULTI_REPLICA_MODE}
      REMOTE_INSTANCES: ${SYNC_SERVICE_SERVER_REMOTE_INSTANCES}
      REDIS_URL: ${SYNC_SERVICE_SERVER_REDIS_URL}
      MQTT_BROKER_HOST: ${SYNC_SERVICE_SERVER_MQTT_BROKER_HOST}
      MQTT_BROKER_PORT: ${SYNC_SERVICE_SERVER_MQTT_BROKER_PORT}
      AUTOREPUB_MQTT_BROKER_HOST: ${SYNC_SERVICE_SERVER_AUTOREPUB_MQTT_BROKER_HOST}
      AUTOREPUB_MQTT_BROKER_PORT: ${SYNC_SERVICE_SERVER_AUTOREPUB_MQTT_BROKER_PORT}
      RABBITMQ_DSN: ${SYNC_SERVICE_SERVER_RABBITMQ_DSN}
    deploy:
      replicas: 1
    ports:
      - "${SYNC_SERVICE_SERVER_PORT}:8000"
    depends_on:
      redis:
        condition: service_healthy
      nanomq-server:
        condition: service_healthy
      rabbitmq-server:
        condition: service_healthy
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: registry.dmi-msk.ru/base-images:mini-mc-RELEASE.2025-09-07T16-13-09Z-master
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT}:9000" # S3 API
      - "${MINIO_UI_PORT}:9001" # Web UI
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    networks:
      - dispatching-server-network

  minio-setup:
    image: ${MINIO_DISP_IMAGE:-registry.dmi-msk.ru/minio-disp}:${MINIO_DISP_IMAGE_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq-server:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command: [ "/setup.sh" ]
    environment:
      MINIO_HOST: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      BUCKET_CONFIG_FILE: /buckets.json
      EVENTS: "put"
      # AMQP target id (как раньше WEBHOOK_ARN_ID)
      AMQP_ARN_ID: PRIMARY
      # RabbitMQ connection
      AMQP_URL: "amqp://s3_minio_user:s3_minio_pass@rabbitmq-server:5672/"
      AMQP_EXCHANGE: "minio.events"
      AMQP_ROUTING_KEY: "minio.dump-service"
      AMQP_EXCHANGE_TYPE: "topic"
      AMQP_DURABLE: "on"
    networks:
      - dispatching-server-network

  # Dozzle - просмотр логов контейнеров
  dozzle:
    image: registry.dmi-msk.ru/base-images:dozzle-master
    container_name: dispatching-server-dozzle-server
    restart: unless-stopped
    ports:
      - "${DOZZLE_SERVER_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
      DOZZLE_FILTER: "name=dispatching-*"
    networks:
      - dispatching-server-network


  # analytics-service
  analytics-service:
    image: ${ANALYTICS_SERVICE_IMAGE:-registry.dmi-msk.ru/analytics-service}:${ANALYTICS_SERVICE_IMAGE_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-server-analytics-service
    ports:
      - "${ANALYTICS_SERVICE_PORT}:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      MODE: dev

      # s3
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_ENDPOINT_URL: ${MINIO_ENDPOINT_URL}
      S3_REGION_NAME: ${MINIO_REGION_NAME}
      S3_BUCKET_NAME: dump-service

      # rabbitmq
      RABBIT_USER: analytics_service_user
      RABBIT_PASSWORD: analytics_service_pass
      RABBIT_HOST: rabbitmq-server
      RABBIT_PORT: 5672
      # click
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: ${CLICKHOUSE_HTTP_PORT}
      CLICKHOUSE_USERNAME: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DATABASE: default
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq-server:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - dispatching-server-network


  debezium-server-graph-service:
    image: ${DEBEZIUM_DISP_IMAGE:-registry.dmi-msk.ru/debezium-disp}:${DEBEZIUM_DISP_IMAGE_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: debezium-server-graph-service
    environment:
      DEBEZIUM_OPTS: "-Dquarkus.config.locations=file:/config/graph-service/application.properties"
    depends_on:
      rabbitmq-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - debezium_graph_data:/debezium/data
    networks:
      - dispatching-server-network


  debezium-server-enterprise-service:
    image: ${DEBEZIUM_DISP_IMAGE:-registry.dmi-msk.ru/debezium-disp}:${DEBEZIUM_DISP_IMAGE_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: debezium-server-enterprise-service
    environment:
      DEBEZIUM_OPTS: "-Dquarkus.config.locations=file:/config/enterprise-service/application.properties"
    depends_on:
      rabbitmq-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - debezium_enterprise_data:/debezium/data
    networks:
      - dispatching-server-network


  debezium-server-auth-service:
    image: ${DEBEZIUM_DISP_IMAGE:-registry.dmi-msk.ru/debezium-disp}:${DEBEZIUM_DISP_IMAGE_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: debezium-server-auth-service
    environment:
      DEBEZIUM_OPTS: "-Dquarkus.config.locations=file:/config/auth-service/application.properties"
    depends_on:
      rabbitmq-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - debezium_auth_data:/debezium/data
    networks:
      - dispatching-server-network


  debezium-server-trip-service:
    image: ${DEBEZIUM_DISP_IMAGE:-registry.dmi-msk.ru/debezium-disp}:${DEBEZIUM_DISP_IMAGE_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: debezium-server-trip-service
    environment:
      DEBEZIUM_OPTS: "-Dquarkus.config.locations=file:/config/trip-service/application.properties"
    depends_on:
      rabbitmq-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - debezium_trip_data:/debezium/data
    networks:
      - dispatching-server-network


  wifi-event-dispatcher-server:
    image: ${WIFI_EVENT_DISPATCHER_SERVER_IMAGE:-registry.dmi-msk.ru/wifi-event-dispatcher}:${WIFI_EVENT_DISPATCHER_SERVER_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-wifi-event-dispatcher-server
    entrypoint: [ "/server" ]
    restart: unless-stopped
    environment:
      RABBIT_HOST: rabbitmq-server
      RABBIT_PORT: 5672
      RABBIT_USER: ${WIFI_RABBIT_USER}
      RABBIT_PASSWORD: ${WIFI_RABBIT_PASS}
      ENVIRONMENT: production
      SERVER_PORT: ${WIFI_GRPC_PORT}

    ports:
      - "${WIFI_GRPC_PORT}:8085"
    depends_on:
      rabbitmq-server:
        condition: service_healthy
    networks:
      - dispatching-server-network

  # Auth Service Backend API
  auth-service-backend:
    image: ${AUTH_SERVICE_BACKEND_IMAGE:-registry.dmi-msk.ru/auth-service-backend}:${AUTH_SERVICE_BACKEND_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-server-auth-backend
    restart: unless-stopped
    ports:
      - "${AUTH_BACKEND_PORT}:8000"
    environment:
      SECRET_KEY: ${AUTH_SERVICE_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      ALGORITHM: ${AUTH_JWT_ALGORITHM}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AUTH_POSTGRES_DB}"
      MODE: ${AUTH_MODE}
    depends_on:
      - postgres
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Api Gateway
  api-gateway:
    image: ${API_GATEWAY_IMAGE:-registry.dmi-msk.ru/api-gateway}:${API_GATEWAY_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-api-gateway
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT}:8000"
    networks:
      - dispatching-server-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # cdc-distributor
  cdc-distributor:
    image: ${CDC_DISTRIBUTOR_IMAGE:-registry.dmi-msk.ru/cdc-distributor}:${CDC_DISTRIBUTOR_TAG:-${DEFAULT_IMAGE_TAG:-dev-latest}}
    container_name: dispatching-cdc-distributor
    restart: unless-stopped
    environment:
      #RabbitMQ CDC settings
      RABBIT_HOST: rabbitmq-server
      RABBIT_PORT: 5552
      RABBIT_USER: ${CDC_RABBIT_USER}
      RABBIT_PASSWORD: ${CDC_RABBIT_PASSWORD}
      
      #RabbitMQ AMQP settings
      RABBIT_AMQP_HOST: rabbitmq-server
      RABBIT_AMQP_PORT: 5672
      RABBIT_AMQP_USER: admin
      RABBIT_AMQP_PASSWORD: public
      
      # Fan-out bort configuration
      BORT_IDS: "[${BORT_IDS}]"

      # Distributor DB for per-bort offset tracking
      DISTRIBUTOR__POSTGRES_HOST: postgres
      DISTRIBUTOR__POSTGRES_PORT: 5432
      DISTRIBUTOR__POSTGRES_USER: ${POSTGRES_USER}
      DISTRIBUTOR__POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DISTRIBUTOR__POSTGRES_DATABASE: ${DISTRIBUTOR_POSTGRES_DB}

    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq-server:
        condition: service_healthy
    networks:
      - dispatching-server-network

networks:
  dispatching-server-network:
    driver: bridge

volumes:
  clickhouse-data:
  # trino-data:
  # superset-data:
  # airbyte-data:
  postgres-server-data:
  redis-server-data:
  nanomq-data:
  rabbitmq-server-data:
  minio_data:
  debezium_graph_data:
  debezium_enterprise_data:
  debezium_auth_data:
  debezium_trip_data:
  vault_data:
  vault_state:
